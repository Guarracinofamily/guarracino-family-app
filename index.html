      function NotesThread(props) {
        var task = props.task;
        var onAddNote = props.onAddNote;
        var notes = [];
        try { notes = JSON.parse(task.notes_thread || "[]"); } catch(e) {}
        var [noteText, setNoteText] = useState("");
        var [adding, setAdding] = useState(false);
        var [editingIndex, setEditingIndex] = useState(null);
        var [editText, setEditText] = useState("");

        function handleAdd() {
          if (!noteText.trim()) return;
          setAdding(true);
          var d = new Date();
          var newNote = { text: noteText.trim(), author: "Family", time: d.getDate() + " " + d.toLocaleString('en',{month:'short'}) + " " + d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0') };
          var updated = notes.concat([newNote]);
          onAddNote(task.id, JSON.stringify(updated));
          setNoteText("");
          setAdding(false);
        }

        function handleDelete(index) {
          var updated = notes.filter(function(_,i){ return i !== index; });
          onAddNote(task.id, JSON.stringify(updated));
        }

        function handleEdit(index) {
          if (!editText.trim()) return;
          var updated = notes.map(function(n,i){ return i === index ? Object.assign({},n,{text:editText.trim(),edited:true}) : n; });
          onAddNote(task.id, JSON.stringify(updated));
          setEditingIndex(null);
          setEditText("");
        }

        return (
          <div style={{marginTop:8}} onClick={function(e){e.stopPropagation();}}>
            {notes.map(function(n,i) {
              return (
                <div key={i} className="note-bubble">
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{n.author} - {n.time}{n.edited?" (edited)":""}</span>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={function(){setEditingIndex(i);setEditText(n.text);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#9ca3af"}}>edit</button>
                      <button onClick={function(){handleDelete(i);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#fca5a5"}}>delete</button>
                    </div>
                  </div>
                  {editingIndex === i ? (
                    <div style={{display:"flex",gap:6}}>
                      <input className="note-input" value={editText} onChange={function(e){setEditText(e.target.value);}} style={{flex:1}} autoFocus />
                      <button className="note-send-btn" onClick={function(){handleEdit(i);}}>Save</button>
                      <button onClick={function(){setEditingIndex(null);}} style={{padding:"8px 10px",background:"none",border:"1.5px solid #e5e7eb",borderRadius:8,cursor:"pointer",fontSize:12}}>x</button>
                    </div>
                  ) : (
                    <div style={{fontSize:13}}>{n.text}</div>
                  )}
                </div>
              );
            })}
            <div className="note-input-row">
              <input className="note-input" placeholder="Add update..." value={noteText} onChange={function(e){setNoteText(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleAdd();}} />
              <button className="note-send-btn" onClick={handleAdd} disabled={adding}>{adding?"...":"Add"}</button>
            </div>
          </div>
        );
      }

      function TaskModal(props) {
        var task = props.task;
        var onClose = props.onClose;
        var onSave = props.onSave;
        var onDelete = props.onDelete;
        var isEdit = !!task;
        var [text, setText] = useState(task ? task.task_text : "");
        var [category, setCategory] = useState(task ? task.category : CATEGORIES[0]);
        var [owner, setOwner] = useState(task ? task.owner : "Emanuel");
        var [dueDate, setDueDate] = useState(task ? task.due_date : "");
        var [note, setNote] = useState(task ? task.note : "");
        var [urgent, setUrgent] = useState(task ? task.urgent : false);
        var [saving, setSaving] = useState(false);
        var [confirmDelete, setConfirmDelete] = useState(false);

        function handleSave() {
          if (!text.trim()) return;
          setSaving(true);
          onSave(Object.assign({}, task||{}, {task_text:text.trim(),category:category,owner:owner,due_date:dueDate,note:note,urgent:urgent,completed:task?task.completed:false,notes_thread:task?task.notes_thread:"[]"}));
          setSaving(false);
          onClose();
        }

        function handleDelete() {
          onDelete(task.id);
          onClose();
        }

        return (
          <div className="modal-overlay" onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
            <div className="modal-box">
              <div className="modal-title">{isEdit?"Edit task":"Add new task"}</div>
              <div className="form-field">
                <label className="form-label">Task</label>
                <input className="form-input" placeholder="What needs to be done?" value={text} onChange={function(e){setText(e.target.value);}} autoFocus />
              </div>
              <div className="form-field">
                <label className="form-label">Category</label>
                <select className="form-select" value={category} onChange={function(e){setCategory(e.target.value);}}>
                  {CATEGORIES.map(function(c){return <option key={c} value={c}>{c}</option>;})}
                </select>
              </div>
              <div style={{display:"flex",gap:10}}>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Owner</label>
                  <select className="form-select" value={owner} onChange={function(e){setOwner(e.target.value);}}>
                    {["Francesco","Mamma","Emanuel","All"].map(function(o){return <option key={o} value={o}>{o}</option>;})}
                  </select>
                </div>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Due date</label>
                  <input className="form-input" placeholder="e.g. Jul 2026" value={dueDate} onChange={function(e){setDueDate(e.target.value);}} />
                </div>
              </div>
              <div className="form-field">
                <label className="form-label">Note</label>
                <input className="form-input" placeholder="Any extra detail..." value={note} onChange={function(e){setNote(e.target.value);}} />
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                <div onClick={function(){setUrgent(!urgent);}} style={{width:44,height:26,borderRadius:13,cursor:"pointer",background:urgent?"#f59e0b":"#e5e7eb",position:"relative",transition:"background 0.2s"}}>
                  <div style={{width:20,height:20,borderRadius:10,background:"#fff",position:"absolute",top:3,left:urgent?21:3,transition:"left 0.2s"}} />
                </div>
                <span style={{fontSize:13,color:"#374151"}}>Mark as urgent</span>
              </div>
              <button className="btn-primary" onClick={handleSave} disabled={saving}>{saving?"Saving...":isEdit?"Save changes":"Add task"}</button>
              {isEdit && !confirmDelete && (
                <button className="btn-danger" onClick={function(){setConfirmDelete(true);}}>Delete task</button>
              )}
              {isEdit && confirmDelete && (
                <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:12,padding:"14px 16px",marginTop:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#dc2626",marginBottom:10}}>Delete permanently?</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={handleDelete} style={{flex:1,padding:"10px",background:"#dc2626",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Yes, delete</button>
                    <button onClick={function(){setConfirmDelete(false);}} style={{flex:1,padding:"10px",background:"#fff",color:"#374151",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,cursor:"pointer"}}>Cancel</button>
                  </div>
                </div>
              )}
              <button className="btn-cancel" onClick={onClose}>Cancel</button>
            </div>
          </div>
        );
      }

      function TaskCard(props) {
        var task = props.task;
        var onToggle = props.onToggle;
        var onEdit = props.onEdit;
        var onAddNote = props.onAddNote;
        var [expanded, setExpanded] = useState(false);
        var [completing, setCompleting] = useState(false);
        var c = OWNER_COLORS[task.owner] || OWNER_COLORS.All;
        var noteCount = 0;
        try { noteCount = JSON.parse(task.notes_thread || "[]").length; } catch(e) {}

        function handleCheck(e) {
          e.stopPropagation();
          if (!task.completed) {
            setCompleting(true);
            setTimeout(function(){ onToggle(task.id, task.completed); setCompleting(false); }, 350);
          } else {
            onToggle(task.id, task.completed);
          }
        }

        return (
          <div style={{background:task.completed?"#fafafa":"#fff",border:"1px solid "+(task.completed?"#f0ede8":"#e5e3df"),borderRadius:10,overflow:"hidden",boxShadow:task.completed?"none":"0 1px 3px rgba(0,0,0,0.04)",opacity:task.completed?0.6:1,transition:"opacity 0.3s"}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",padding:"13px 16px"}}>
              <div onClick={handleCheck} style={{width:36,height:36,borderRadius:9,flexShrink:0,marginTop:-2,background:completing?"#22c55e":task.completed?"#1e6eb5":"#fff",border:"2px solid "+(completing?"#22c55e":task.completed?"#1e6eb5":"#d1d5db"),display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",minWidth:36,transition:"all 0.3s"}}>
                {(task.completed||completing) && <span style={{color:"#fff",fontSize:15,fontWeight:700}}>v</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>

      function BudgetRow(props) {
        var row = props.row;
        var onSave = props.onSave;
        var onDelete = props.onDelete;
        var showWho = props.showWho;
        var [editing, setEditing] = useState(false);
        var [item, setItem] = useState(row.item);
        var [eur, setEur] = useState(row.eur);
        var [who, setWho] = useState(row.who || "");
        var [confirm, setConfirm] = useState(false);

        function handleSave() {
          onSave(row.id, {item:item, eur:eur, who:who});
          setEditing(false);
        }

        function handleDelete() {
          if (!confirm) { setConfirm(true); return; }
          onDelete(row.id);
        }

        if (editing) {
          return (
            <div style={{padding:"10px 16px",borderBottom:"1px solid #f0ede8",background:"#f8fbff"}}>
              <div style={{display:"flex",gap:8,marginBottom:8,flexWrap:"wrap"}}>
                <input value={item} onChange={function(e){setItem(e.target.value);}} placeholder="Item" style={{flex:2,minWidth:120,padding:"7px 10px",border:"1.5px solid #1e6eb5",borderRadius:8,fontSize:13,outline:"none"}} />
                <input value={eur} onChange={function(e){setEur(e.target.value);}} placeholder="Amount e.g. 500" style={{flex:1,minWidth:80,padding:"7px 10px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none"}} />
                {showWho && <input value={who} onChange={function(e){setWho(e.target.value);}} placeholder="Who" style={{flex:1,minWidth:80,padding:"7px 10px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none"}} />}
              </div>
              <div style={{display:"flex",gap:6}}>
                <button onClick={handleSave} style={{padding:"6px 14px",background:"#1e6eb5",color:"#fff",border:"none",borderRadius:7,fontSize:12,fontWeight:600,cursor:"pointer"}}>Save</button>
                <button onClick={function(){setEditing(false);setConfirm(false);}} style={{padding:"6px 12px",background:"#fff",color:"#6b7280",border:"1.5px solid #e5e7eb",borderRadius:7,fontSize:12,cursor:"pointer"}}>Cancel</button>
                <button onClick={handleDelete} style={{padding:"6px 12px",background:confirm?"#dc2626":"none",color:confirm?"#fff":"#dc2626",border:"1.5px solid "+(confirm?"#dc2626":"#fecaca"),borderRadius:7,fontSize:12,cursor:"pointer",marginLeft:"auto"}}>
                  {confirm?"Confirm delete":"Delete"}
                </button>
              </div>
            </div>
          );
        }

        return (
          <div onClick={function(){setEditing(true);setConfirm(false);}} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:"1px solid #f0ede8",cursor:"pointer",background:"#fff"}}
            onMouseEnter={function(e){e.currentTarget.style.background="#f8fbff";}}
            onMouseLeave={function(e){e.currentTarget.style.background="#fff";}}>
            <span style={{fontSize:13,color:"#374151",flex:1}}>{row.item}</span>
            <div style={{display:"flex",gap:12,alignItems:"center"}}>
              {showWho && row.who && <span style={{fontSize:12,color:"#9ca3af"}}>{row.who}</span>}
              <span style={{fontSize:13,fontWeight:600,color:"#1a1a1a",minWidth:70,textAlign:"right"}}>{row.eur}</span>
              <span style={{fontSize:11,color:"#9ca3af"}}>tap to edit</span>
            </div>
          </div>
        );
      }

              <input value={item} onChange={function(e){setItem(e.target.value);}} placeholder="Item description" autoFocus style={{flex:2,minWidth:120,padding:"7px 10px",border:"1.5px solid #1e6eb5",borderRadius:8,fontSize:13,outline:"none"}} />
              <input value={eur} onChange={function(e){setEur(e.target.value);}} placeholder="Amount e.g. 500" style={{flex:1,minWidth:80,padding:"7px 10px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none"}} />
              {showWho && <input value={who} onChange={function(e){setWho(e.target.value);}} placeholder="Who pays" style={{flex:1,minWidth:80,padding:"7px 10px",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,outline:"none"}} />}

        {item:"Apostille documents",eur:"100-200",who:"Francesco"},
        {item:"Misc buffer",eur:"300",who:"-"},
      ];
      var MONTHLY_SEED = [
        {item:"Rent",eur:"800-1,000"},{item:"Food and groceries",eur:"200-250"},
        {item:"Public transport",eur:"80-100"},{item:"Phone",eur:"15-20"},

      function BudgetTab() {
        var [oneoff, setOneoff] = useState([]);
        var [monthly, setMonthly] = useState([]);
        var [loading, setLoading] = useState(true);

        useEffect(function(){
          loadBudget();
        }, []);

        function loadBudget() {
          supabase.from("budget_oneoff").select("*").order("created_at").then(function(r1){
            supabase.from("budget_monthly").select("*").order("created_at").then(function(r2){
              var oo = r1.data || [];
              var mo = r2.data || [];
              if (oo.length === 0) {
                supabase.from("budget_oneoff").insert(ONEOFF_SEED).then(function(){
                  supabase.from("budget_oneoff").select("*").order("created_at").then(function(r){setOneoff(r.data||[]);});
                });
              } else { setOneoff(oo); }
              if (mo.length === 0) {
                supabase.from("budget_monthly").insert(MONTHLY_SEED).then(function(){
                  supabase.from("budget_monthly").select("*").order("created_at").then(function(r){setMonthly(r.data||[]);});
                });
              } else { setMonthly(mo); }
              setLoading(false);
            });
          });
        }

        function saveOneoff(id, data) {
          supabase.from("budget_oneoff").update(data).eq("id",id).then(function(){
            setOneoff(function(prev){return prev.map(function(r){return r.id===id?Object.assign({},r,data):r;});});
          });
        }
        function deleteOneoff(id) {
          supabase.from("budget_oneoff").delete().eq("id",id).then(function(){
            setOneoff(function(prev){return prev.filter(function(r){return r.id!==id;});});
          });
        }
        function addOneoff(data) {
          supabase.from("budget_oneoff").insert([data]).select().then(function(r){
            if(r.data) setOneoff(function(prev){return prev.concat(r.data);});
          });
        }
        function saveMonthly(id, data) {
          supabase.from("budget_monthly").update(data).eq("id",id).then(function(){
            setMonthly(function(prev){return prev.map(function(r){return r.id===id?Object.assign({},r,data):r;});});
          });
        }
        function deleteMonthly(id) {
          supabase.from("budget_monthly").delete().eq("id",id).then(function(){
            setMonthly(function(prev){return prev.filter(function(r){return r.id!==id;});});
          });
        }
        function addMonthly(data) {
          supabase.from("budget_monthly").insert([data]).select().then(function(r){
            if(r.data) setMonthly(function(prev){return prev.concat(r.data);});
          });
        }

        if (loading) return <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>Loading budget...</div>;

        return (
          <div>
            <div style={{marginBottom:24}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a"}}>One-Off Setup Costs</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>tap any row to edit</div>
              </div>
              <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,overflow:"hidden"}}>
                {oneoff.map(function(row){
                  return <BudgetRow key={row.id} row={row} onSave={saveOneoff} onDelete={deleteOneoff} showWho={true} />;
                })}
                <AddBudgetRow onAdd={addOneoff} showWho={true} />
              </div>
            </div>
            <div>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a"}}>Monthly Running Costs</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>tap any row to edit</div>
              </div>
              <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,overflow:"hidden"}}>
                {monthly.map(function(row){
                  return <BudgetRow key={row.id} row={row} onSave={saveMonthly} onDelete={deleteMonthly} showWho={false} />;
                })}
                <AddBudgetRow onAdd={addMonthly} showWho={false} />
              </div>
            </div>
          </div>
        );
      }

      function App() {
        var [tasks, setTasks] = useState([]);
        var [loading, setLoading] = useState(true);
        var [activeTab, setActiveTab] = useState("tasks");
        var [activeCategory, setActiveCategory] = useState("All Tasks");
        var [activeOwner, setActiveOwner] = useState("All");
        var [editingTask, setEditingTask] = useState(null);
        var [showAdd, setShowAdd] = useState(false);
        var [seeded, setSeeded] = useState(false);
        var [showInstall, setShowInstall] = useState(true);
        var [showDone, setShowDone] = useState(false);
        var [quickFilter, setQuickFilter] = useState(null);
        var [sortBy, setSortBy] = useState("default");

        useEffect(function(){
          loadTasks();
          var ch = supabase.channel("tasks-stable")
            .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},function(){loadTasks();})
            .subscribe();
          return function(){ supabase.removeChannel(ch); };
        }, []);

        function loadTasks() {
          supabase.from("tasks").select("*").order("created_at").then(function(result){
            var data = result.data;
            var error = result.error;
            if (error) { setLoading(false); return; }
            if (data.length === 0 && !seeded) {
              setSeeded(true);
              supabase.from("tasks").insert(INITIAL_TASKS).then(function(){
                supabase.from("tasks").select("*").order("created_at").then(function(r2){
                  setTasks(r2.data || []);
                  setLoading(false);
                });
              });
            } else {
              setTasks(data);
              setLoading(false);
            }
          });
        }

        function toggleTask(id, completed) {
          supabase.from("tasks").update({completed:!completed}).eq("id",id).then(function(){
            setTasks(function(prev){ return prev.map(function(t){ return t.id===id ? Object.assign({},t,{completed:!completed}) : t; }); });
          });
        }

        function saveTask(taskData) {
          if (taskData.id) {
            supabase.from("tasks").update(taskData).eq("id",taskData.id).then(function(){
              setTasks(function(prev){ return prev.map(function(t){ return t.id===taskData.id ? Object.assign({},t,taskData) : t; }); });
            });
          } else {
            supabase.from("tasks").insert([taskData]).select().then(function(r){
              if (r.data) setTasks(function(prev){ return prev.concat(r.data); });
            });
          }
        }

        function deleteTask(id) {
          supabase.from("tasks").delete().eq("id",id).then(function(){
            setTasks(function(prev){ return prev.filter(function(t){ return t.id!==id; }); });
          });
        }

        function addNote(id, notesThread) {
          supabase.from("tasks").update({notes_thread:notesThread}).eq("id",id).then(function(){
            setTasks(function(prev){ return prev.map(function(t){ return t.id===id ? Object.assign({},t,{notes_thread:notesThread}) : t; }); });
          });
        }

        var allFiltered = tasks.filter(function(t){
          return (activeCategory==="All Tasks" || t.category===activeCategory) && (activeOwner==="All" || t.owner===activeOwner);
        });

        var activeTasks = allFiltered.filter(function(t){
          if (quickFilter==="urgent") return t.urgent && !t.completed;
          return !t.completed;
        });

        if (sortBy==="deadline") {
          var ORDER = {"Immediately":0,"This week":1,"Book by end Jun 2026":2,"2 Jul 2026":3,"5 Jul 2026":4,"Week of 7 Jul 2026":5,"Before Jul 2026":6,"July 2026":7,"Before 1 Aug 2026":8,"August 2026":9,"Before 31 Aug 2026":10,"Late Aug 2026":11,"As soon as found":12,"On contract signing":13,"Weekly check":14,"First week Amsterdam":15,"Day of arrival":16,"Within 5 days of arrival":17,"Before Emanuel arrives":18};
          activeTasks = activeTasks.slice().sort(function(a,b){
            var ap = a.urgent ? -1 : (ORDER[a.due_date] !== undefined ? ORDER[a.due_date] : 99);
            var bp = b.urgent ? -1 : (ORDER[b.due_date] !== undefined ? ORDER[b.due_date] : 99);
            return ap - bp;
          });
        }

        var doneTasks = quickFilter==="urgent" ? [] : allFiltered.filter(function(t){ return t.completed; });
        var completedCount = tasks.filter(function(t){ return t.completed; }).length;
        var totalCount = tasks.length;
        var urgentCount = tasks.filter(function(t){ return t.urgent && !t.completed; }).length;
        var progress = totalCount > 0 ? Math.round((completedCount/totalCount)*100) : 0;

        return (
          <div style={{minHeight:"100vh",background:"#faf9f7",paddingBottom:80,paddingTop:showInstall?46:0}}>

            {showInstall && (
              <div className="install-banner">
                <span style={{fontSize:13,fontWeight:500}}>Install on iPhone: tap Share then "Add to Home Screen"</span>
                <button onClick={function(){setShowInstall(false);}} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer",lineHeight:1}}>x</button>
              </div>
            )}

            <div style={{background:"#fff",borderBottom:"1px solid #e5e3df",padding:"0 20px",position:"sticky",top:showInstall?46:0,zIndex:10}}>
              <div style={{maxWidth:860,margin:"0 auto"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0 10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <GIcon size={44} />
                    <div>
                      <div style={{fontSize:18,fontWeight:700,color:"#1a1a1a",fontFamily:"Futura,Century Gothic,sans-serif"}}>Guarracino</div>
                      <div style={{fontSize:10,color:"#9ca3af",letterSpacing:"2px",fontFamily:"Futura,Century Gothic,sans-serif"}}>FAMILY</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:700,color:"#1e6eb5"}}>{progress}%</div>
                    <div style={{fontSize:11,color:"#9ca3af"}}>{completedCount}/{totalCount} done</div>
                  </div>
                </div>

                <div style={{marginBottom:10}}>
                  <div style={{height:10,background:"#e5e7eb",borderRadius:5,overflow:"hidden"}}>
                    <div style={{height:"100%",width:progress+"%",background:"linear-gradient(90deg,#60a5fa,#1e6eb5)",borderRadius:5,transition:"width 0.6s ease",minWidth:progress>0?"10px":"0"}} />
                  </div>
                  {progress > 0 && <div style={{fontSize:10,color:"#1e6eb5",fontWeight:600,textAlign:"right",marginTop:2}}>{progress}% complete</div>}
                </div>

                <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                  {urgentCount > 0 && (
                    <button onClick={function(){setQuickFilter(quickFilter==="urgent"?null:"urgent");setActiveTab("tasks");}} style={{background:quickFilter==="urgent"?"#f59e0b":"#fef3c7",border:"1px solid #fcd34d",borderRadius:20,padding:"3px 10px",fontSize:11,color:quickFilter==="urgent"?"#fff":"#92400e",fontWeight:500,cursor:"pointer"}}>
                      {urgentCount} urgent
                    </button>
                  )}
                  <button onClick={function(){setQuickFilter(quickFilter==="done"?null:"done");setShowDone(true);setActiveTab("tasks");}} style={{background:quickFilter==="done"?"#166534":"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:20,padding:"3px 10px",fontSize:11,color:quickFilter==="done"?"#fff":"#166534",fontWeight:500,cursor:"pointer"}}>
                    {completedCount} done
                  </button>
                  <span style={{background:"#f8f9fa",border:"1px solid #e5e7eb",borderRadius:20,padding:"3px 10px",fontSize:11,color:"#6b7280",fontWeight:500}}>
                    {totalCount-completedCount} remaining
                  </span>
                </div>

                <div style={{display:"flex"}}>
                  {[["tasks","Tasks"],["timeline","Timeline"],["housing","Housing"],["budget","Budget"]].map(function(item){
                    return <button key={item[0]} onClick={function(){setActiveTab(item[0]);}} style={{padding:"9px 14px",fontSize:13,fontWeight:500,background:"none",border:"none",cursor:"pointer",borderBottom:activeTab===item[0]?"2px solid #1e6eb5":"2px solid transparent",color:activeTab===item[0]?"#1e6eb5":"#6b7280"}}>{item[1]}</button>;
                  })}
                </div>
              </div>
            </div>

            <div style={{maxWidth:860,margin:"0 auto",padding:"20px"}}>

              {activeTab==="tasks" && (
                <div>
                  <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                    {OWNERS.map(function(owner){
                      var c = OWNER_COLORS[owner] || OWNER_COLORS.All;
                      return <button key={owner} onClick={function(){setActiveOwner(owner);}} style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:500,cursor:"pointer",background:activeOwner===owner?(owner==="All"?"#1a1a1a":c.bg):"#fff",color:activeOwner===owner?(owner==="All"?"#fff":c.text):"#6b7280",border:"1.5px solid "+(activeOwner===owner?(owner==="All"?"#1a1a1a":c.border):"#e5e7eb")}}>{owner}</button>;
                    })}
                  </div>

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {ALL_CATEGORIES.map(function(cat){
                        return <button key={cat} onClick={function(){setActiveCategory(cat);}} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",background:activeCategory===cat?"#1e6eb5":"#fff",color:activeCategory===cat?"#fff":"#6b7280",border:"1.5px solid "+(activeCategory===cat?"#1e6eb5":"#e5e7eb")}}>{cat}</button>;

                    <div style={{display:"flex",gap:4,flexShrink:0,marginLeft:8}}>
                      <button onClick={function(){setSortBy("default");}} style={{padding:"4px 8px",borderRadius:6,fontSize:11,cursor:"pointer",background:sortBy==="default"?"#1e6eb5":"#fff",color:sortBy==="default"?"#fff":"#6b7280",border:"1.5px solid "+(sortBy==="default"?"#1e6eb5":"#e5e7eb")}}>Default</button>
                      <button onClick={function(){setSortBy("deadline");}} style={{padding:"4px 8px",borderRadius:6,fontSize:11,cursor:"pointer",background:sortBy==="deadline"?"#1e6eb5":"#fff",color:sortBy==="deadline"?"#fff":"#6b7280",border:"1.5px solid "+(sortBy==="deadline"?"#1e6eb5":"#e5e7eb")}}>Deadline</button>
                    </div>
                  </div>

                  {loading ? <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>Loading...</div> : (
                    <div>
                      {quickFilter==="done" ? (
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {doneTasks.length===0
                            ? <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>No completed tasks yet.</div>
                            : doneTasks.map(function(task){ return <TaskCard key={task.id} task={task} onToggle={toggleTask} onEdit={setEditingTask} onAddNote={addNote} />; })
                          }
                        </div>
                      ) : (
                        <div>
                          {activeTasks.length===0 && <div style={{textAlign:"center",padding:40,color:"#9ca3af"}}>No tasks here.</div>}
                          <div style={{display:"flex",flexDirection:"column",gap:8}}>
                            {activeTasks.map(function(task){ return <TaskCard key={task.id} task={task} onToggle={toggleTask} onEdit={setEditingTask} onAddNote={addNote} />; })}
                          </div>
                          {doneTasks.length > 0 && (
                            <div style={{marginTop:20}}>
                              <button onClick={function(){setShowDone(!showDone);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>
                                {showDone?"▼":"▶"} Completed ({doneTasks.length})
                              </button>
                              {showDone && (
                                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                                  {doneTasks.map(function(task){ return <TaskCard key={task.id} task={task} onToggle={toggleTask} onEdit={setEditingTask} onAddNote={addNote} />; })}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {activeTab==="timeline" && <Timeline />}

              {activeTab==="housing" && (
                <div>
                  <div style={{marginBottom:20}}>
                    <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a",marginBottom:4}}>Housing Platforms</div>
                    <div style={{fontSize:13,color:"#6b7280"}}>Register on all 5. More registrations = better chances.</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {HOUSING_AGENCIES.map(function(agency){
                      return (
                        <a key={agency.name} href={agency.url} target="_blank" rel="noopener noreferrer">
                          <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,padding:"15px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",borderLeft:"4px solid "+agency.color}}>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                                <span style={{fontSize:14,fontWeight:600,color:"#1a1a1a"}}>{agency.name}</span>
                                <span style={{fontSize:10,fontWeight:600,color:agency.color,padding:"2px 7px",borderRadius:10,border:"1px solid "+agency.color}}>{agency.badge}</span>
                              </div>
                              <div style={{fontSize:12,color:"#6b7280"}}>{agency.desc}</div>
                            </div>
                            <div style={{color:"#9ca3af",fontSize:16}}>-&gt;</div>
                          </div>
                        </a>
                      );
                    })}
                  </div>
                </div>
              )}

              {activeTab==="budget" && (
                <BudgetTab />
              )}
            </div>

            {activeTab==="tasks" && (
              <button className="add-fab" onClick={function(){setShowAdd(true);}}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/>
                </svg>
              </button>
            )}

            {showAdd && <TaskModal onClose={function(){setShowAdd(false);}} onSave={saveTask} onDelete={deleteTask} />}
            {editingTask && <TaskModal task={editingTask} onClose={function(){setEditingTask(null);}} onSave={saveTask} onDelete={deleteTask} />}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
