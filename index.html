      function App() {
        const [tasks, setTasks] = useState([]);
        const [loading, setLoading] = useState(true);
        const [activeTab, setActiveTab] = useState("tasks");
        const [activeCategory, setActiveCategory] = useState("All Tasks");
        const [activeOwner, setActiveOwner] = useState("All");
        const [showAdd, setShowAdd] = useState(false);
        const [seeded, setSeeded] = useState(false);
        const [showInstall, setShowInstall] = useState(true);

        useEffect(() => {
          loadTasks();
          const channel = supabase
            .channel("tasks-changes")
            .on("postgres_changes", { event: "*", schema: "public", table: "tasks" }, () => loadTasks())
            .subscribe();
          return () => supabase.removeChannel(channel);
        }, []);

        async function loadTasks() {
          const { data, error } = await supabase.from("tasks").select("*").order("created_at");
          if (error) { setLoading(false); return; }
          if (data.length === 0 && !seeded) {
            setSeeded(true);
            await supabase.from("tasks").insert(INITIAL_TASKS);
            const { data: d2 } = await supabase.from("tasks").select("*").order("created_at");
            setTasks(d2 || []);
          } else {
            setTasks(data);
          }
          setLoading(false);
        }

        async function toggleTask(id, completed) {
          await supabase.from("tasks").update({ completed: !completed }).eq("id", id);
          setTasks(prev => prev.map(t => t.id === id ? { ...t, completed: !completed } : t));
        }

        async function addTask(taskData) {
          const { data } = await supabase.from("tasks").insert([taskData]).select();
          if (data) setTasks(prev => [...prev, ...data]);
        }

        const filtered = tasks.filter(t => {
          const catMatch = activeCategory === "All Tasks" || t.category === activeCategory;
          const ownerMatch = activeOwner === "All" || t.owner === activeOwner;
          return catMatch && ownerMatch;
        });

        const completedCount = tasks.filter(t => t.completed).length;
        const totalCount = tasks.length;
        const urgentCount = tasks.filter(t => t.urgent && !t.completed).length;
        const progress = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;

        return (
          <div style={{ minHeight: "100vh", background: "#faf9f7", paddingBottom: 80 }}>

            {/* Install banner */}
            {showInstall && (
              <div className="install-banner">

                  Install on iPhone: tap Share then "Add to Home Screen"
                </div>
                <button onClick={() => setShowInstall(false)} style={{ background: "none", border: "none", color: "#fff", fontSize: 18, cursor: "pointer", padding: "0 4px" }}>×</button>
              </div>
            )}

            {/* Header */}
            <div style={{ background: "#fff", borderBottom: "1px solid #e5e3df", padding: "0 20px", position: "sticky", top: 0, zIndex: 10 }}>
              <div style={{ maxWidth: 860, margin: "0 auto" }}>
                <div style={{ display: "flex", alignItems: "center", justifyContent: "space-between", padding: "14px 0 12px" }}>
                  <div style={{ display: "flex", alignItems: "center", gap: 12 }}>
                    <GIcon size={44} />
                    <div>
                      <div style={{ fontSize: 18, fontWeight: 700, color: "#1a1a1a", letterSpacing: "-0.3px", fontFamily: "Futura, Century Gothic, sans-serif" }}>Guarracino</div>
                      <div style={{ fontSize: 11, color: "#9ca3af", letterSpacing: "2px", fontFamily: "Futura, Century Gothic, sans-serif" }}>FAMILY</div>
                    </div>
                  </div>
                  <div style={{ textAlign: "right" }}>
                    <div style={{ fontSize: 24, fontWeight: 700, color: "#1e6eb5" }}>{progress}%</div>
                    <div style={{ fontSize: 11, color: "#9ca3af" }}>{completedCount}/{totalCount} done</div>
                  </div>
                </div>
                <div style={{ height: 3, background: "#f0ede8", borderRadius: 2, marginBottom: 10 }}>
                  <div style={{ height: "100%", width: progress + "%", background: "#1e6eb5", borderRadius: 2, transition: "width 0.5s ease" }} />
                </div>
                <div style={{ display: "flex", gap: 8, marginBottom: 10, flexWrap: "wrap" }}>
                  {urgentCount > 0 && <span style={{ background: "#fef3c7", border: "1px solid #fcd34d", borderRadius: 20, padding: "3px 10px", fontSize: 11, color: "#92400e", fontWeight: 500 }}>⚡ {urgentCount} urgent</span>}
                  <span style={{ background: "#f0fdf4", border: "1px solid #bbf7d0", borderRadius: 20, padding: "3px 10px", fontSize: 11, color: "#166534", fontWeight: 500 }}>{completedCount} done</span>
                  <span style={{ background: "#f8f9fa", border: "1px solid #e5e7eb", borderRadius: 20, padding: "3px 10px", fontSize: 11, color: "#6b7280", fontWeight: 500 }}>{totalCount - completedCount} remaining</span>
                </div>
                <div style={{ display: "flex" }}>
                  {[["tasks", "Tasks"], ["housing", "Housing"], ["budget", "Budget"]].map(([key, label]) => (
                    <button key={key} onClick={() => setActiveTab(key)} style={{
                      padding: "9px 16px", fontSize: 13, fontWeight: 500, background: "none", border: "none", cursor: "pointer",
                      borderBottom: activeTab === key ? "2px solid #1e6eb5" : "2px solid transparent",
                      color: activeTab === key ? "#1e6eb5" : "#6b7280"
                    }}>{label}</button>
                  ))}
                </div>
              </div>
            </div>

            <div style={{ maxWidth: 860, margin: "0 auto", padding: "20px 20px" }}>

              {/* TASKS TAB */}
              {activeTab === "tasks" && (
                <div>
                  <div style={{ display: "flex", gap: 8, marginBottom: 12, flexWrap: "wrap" }}>
                    {OWNERS.map(owner => {
                      const c = owner === "All" ? OWNER_COLORS.All : OWNER_COLORS[owner];
                      return (
                        <button key={owner} onClick={() => setActiveOwner(owner)} style={{
                          padding: "5px 14px", borderRadius: 20, fontSize: 12, fontWeight: 500, cursor: "pointer",
                          background: activeOwner === owner ? (owner === "All" ? "#1a1a1a" : c.bg) : "#fff",
                          color: activeOwner === owner ? (owner === "All" ? "#fff" : c.text) : "#6b7280",
                          border: "1.5px solid " + (activeOwner === owner ? (owner === "All" ? "#1a1a1a" : c.border) : "#e5e7eb")
                        }}>{owner}</button>
                      );
                    })}
                  </div>
                  <div style={{ display: "flex", gap: 6, marginBottom: 18, flexWrap: "wrap" }}>
                    {ALL_CATEGORIES.map(cat => (
                      <button key={cat} onClick={() => setActiveCategory(cat)} style={{
                        padding: "4px 10px", borderRadius: 6, fontSize: 11, fontWeight: 500, cursor: "pointer",
                        background: activeCategory === cat ? "#1e6eb5" : "#fff",
                        color: activeCategory === cat ? "#fff" : "#6b7280",
                        border: "1.5px solid " + (activeCategory === cat ? "#1e6eb5" : "#e5e7eb")
                      }}>{cat}</button>
                    ))}
                  </div>

                  {loading ? (
                    <div style={{ textAlign: "center", padding: 60, color: "#9ca3af" }}>Loading...</div>
                  ) : (
                    <div style={{ display: "flex", flexDirection: "column", gap: 8 }}>
                      {filtered.length === 0 && (
                        <div style={{ textAlign: "center", padding: 60, color: "#9ca3af" }}>No tasks here.</div>
                      )}
                      {filtered.map(task => {
                        const c = OWNER_COLORS[task.owner] || OWNER_COLORS.All;
                        return (
                          <div key={task.id} onClick={() => toggleTask(task.id, task.completed)} style={{
                            background: task.completed ? "#fafafa" : "#fff",
                            border: "1px solid " + (task.completed ? "#f0ede8" : "#e5e3df"),
                            borderRadius: 10, padding: "13px 16px", cursor: "pointer",
                            display: "flex", gap: 12, alignItems: "flex-start",
                            opacity: task.completed ? 0.5 : 1,
                            boxShadow: task.completed ? "none" : "0 1px 3px rgba(0,0,0,0.04)"
                          }}>
                            <div style={{
                              width: 22, height: 22, borderRadius: 6, flexShrink: 0, marginTop: 1,
                              background: task.completed ? "#1e6eb5" : "#fff",
                              border: "2px solid " + (task.completed ? "#1e6eb5" : "#d1d5db"),
                              display: "flex", alignItems: "center", justifyContent: "center"
                            }}>
                              {task.completed && <span style={{ color: "#fff", fontSize: 12, fontWeight: 700 }}>✓</span>}
                            </div>
                            <div style={{ flex: 1 }}>
                              <div style={{ display: "flex", alignItems: "center", gap: 8, flexWrap: "wrap", marginBottom: 5 }}>
                                <span style={{ fontSize: 14, fontWeight: 500, color: task.completed ? "#9ca3af" : "#1a1a1a", textDecoration: task.completed ? "line-through" : "none" }}>{task.task_text}</span>
                                {task.urgent && !task.completed && <span style={{ fontSize: 10, fontWeight: 600, background: "#fef3c7", color: "#92400e", padding: "2px 7px", borderRadius: 10, border: "1px solid #fcd34d" }}>URGENT</span>}
                              </div>
                              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", alignItems: "center" }}>
                                <span style={{ fontSize: 11, background: c.bg, color: c.text, padding: "2px 8px", borderRadius: 10, fontWeight: 500 }}>{task.owner}</span>
                                {task.due_date && <span style={{ fontSize: 11, color: "#9ca3af" }}>{task.due_date}</span>}
                                {task.note && <span style={{ fontSize: 11, color: "#6b7280", fontStyle: "italic" }}>· {task.note}</span>}
                              </div>
                            </div>
                          </div>
                        );
                      })}
                    </div>
                  )}
                </div>
              )}

              {/* HOUSING TAB */}
              {activeTab === "housing" && (
                <div>
                  <div style={{ marginBottom: 20 }}>
                    <div style={{ fontSize: 16, fontWeight: 600, color: "#1a1a1a", marginBottom: 4 }}>Housing Platforms</div>
                    <div style={{ fontSize: 13, color: "#6b7280" }}>Register on all 5. More registrations = better chances.</div>
                  </div>
                  <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
                    {HOUSING_AGENCIES.map(agency => (
                      <a key={agency.name} href={agency.url} target="_blank" rel="noopener noreferrer">
                        <div style={{
                          background: "#fff", border: "1px solid #e5e3df", borderRadius: 12, padding: "15px 18px",
                          display: "flex", alignItems: "center", gap: 14,
                          boxShadow: "0 1px 3px rgba(0,0,0,0.04)", borderLeft: "4px solid " + agency.color
                        }}>
                          <div style={{ flex: 1 }}>
                            <div style={{ display: "flex", alignItems: "center", gap: 8, marginBottom: 3 }}>
                              <span style={{ fontSize: 14, fontWeight: 600, color: "#1a1a1a" }}>{agency.name}</span>
                              <span style={{ fontSize: 10, fontWeight: 600, color: agency.color, padding: "2px 7px", borderRadius: 10, border: "1px solid " + agency.color }}>{agency.badge}</span>
                            </div>
                            <div style={{ fontSize: 12, color: "#6b7280" }}>{agency.desc}</div>
                          </div>
                          <div style={{ color: "#9ca3af", fontSize: 16 }}>→</div>
                        </div>
                      </a>
                    ))}
                  </div>
                </div>
              )}

              {/* BUDGET TAB */}
              {activeTab === "budget" && (
                <div>
                  <div style={{ marginBottom: 24 }}>
                    <div style={{ fontSize: 16, fontWeight: 600, color: "#1a1a1a", marginBottom: 4 }}>One-Off Setup Costs</div>
                    <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 14 }}>Total estimate: 7,000-10,000 EUR</div>
                    <div style={{ background: "#fff", border: "1px solid #e5e3df", borderRadius: 12, overflow: "hidden" }}>
                      {ONE_OFF_COSTS.map((row, i) => (
                        <div key={i} style={{
                          display: "flex", justifyContent: "space-between", alignItems: "center",
                          padding: "10px 16px", borderBottom: i < ONE_OFF_COSTS.length - 1 ? "1px solid #f0ede8" : "none",
                          background: i % 2 === 0 ? "#fff" : "#faf9f7"
                        }}>
                          <span style={{ fontSize: 13, color: "#374151" }}>{row.item}</span>
                          <div style={{ display: "flex", gap: 14, alignItems: "center" }}>
                            <span style={{ fontSize: 12, color: "#9ca3af" }}>{row.who}</span>
                            <span style={{ fontSize: 13, fontWeight: 600, color: "#1a1a1a", minWidth: 80, textAlign: "right" }}>{row.eur}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{ fontSize: 16, fontWeight: 600, color: "#1a1a1a", marginBottom: 4 }}>Monthly Running Costs</div>
                    <div style={{ fontSize: 13, color: "#6b7280", marginBottom: 14 }}>1,425-1,820 EUR/month</div>
                    <div style={{ background: "#fff", border: "1px solid #e5e3df", borderRadius: 12, overflow: "hidden" }}>
                      {MONTHLY_COSTS.map((row, i) => (
                        <div key={i} style={{
                          display: "flex", justifyContent: "space-between", alignItems: "center",
                          padding: "10px 16px", borderBottom: i < MONTHLY_COSTS.length - 1 ? "1px solid #f0ede8" : "none",
                          background: i % 2 === 0 ? "#fff" : "#faf9f7"
                        }}>
                          <span style={{ fontSize: 13, color: "#374151" }}>{row.item}</span>
                          <span style={{ fontSize: 13, fontWeight: 600, color: "#1a1a1a" }}>{row.eur}</span>
                        </div>
                      ))}
                      <div style={{ display: "flex", justifyContent: "space-between", padding: "12px 16px", background: "#eff6ff", borderTop: "2px solid #bfdbfe" }}>
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#1e40af" }}>Monthly Total</span>
                        <span style={{ fontSize: 13, fontWeight: 700, color: "#1e40af" }}>1,425-1,820 EUR</span>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {/* Floating Add Button — only on tasks tab */}
            {activeTab === "tasks" && (
              <button className="add-fab" onClick={() => setShowAdd(true)}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/>
                </svg>
              </button>
            )}

            {/* Add Task Modal */}
            {showAdd && (
              <AddTaskModal
                onClose={() => setShowAdd(false)}
                onSave={addTask}
                defaultCategory={activeCategory !== "All Tasks" ? activeCategory : CATEGORIES[0]}
              />
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
