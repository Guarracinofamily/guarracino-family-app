      function TaskModal({task, onClose, onSave, onDelete}) {
        const [text, setText] = useState(task ? task.task_text : "");
        const [category, setCategory] = useState(task ? task.category : CATEGORIES[0]);
        const [owner, setOwner] = useState(task ? task.owner : "Emanuel");
        const [dueDate, setDueDate] = useState(task ? task.due_date : "");
        const [note, setNote] = useState(task ? task.note : "");
        const [urgent, setUrgent] = useState(task ? task.urgent : false);
        const [saving, setSaving] = useState(false);
        const [confirmDelete, setConfirmDelete] = useState(false);
        const isEdit = !!task;

        async function handleSave() {
          if (!text.trim()) return;
          setSaving(true);
          await onSave({
            ...(task || {}),
            task_text: text.trim(), category, owner,
            due_date: dueDate, note, urgent,
            completed: task ? task.completed : false,
            notes_thread: task ? task.notes_thread : "[]"
          });
          setSaving(false);
          onClose();
        }

        async function handleDelete() {
          if (!confirmDelete) { setConfirmDelete(true); return; }
          await onDelete(task.id);
          onClose();
        }

        return (
          <div className="modal-overlay" onClick={e => e.target === e.currentTarget && onClose()}>
            <div className="modal-box">
              <div className="modal-title">{isEdit ? "Edit task" : "Add new task"}</div>
              <div className="form-field">
                <label className="form-label">Task</label>
                <input className="form-input" placeholder="What needs to be done?" value={text} onChange={e => setText(e.target.value)} autoFocus />
              </div>
              <div className="form-field">
                <label className="form-label">Category</label>
                <select className="form-select" value={category} onChange={e => setCategory(e.target.value)}>
                  {CATEGORIES.map(c => <option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              <div style={{display:"flex",gap:10}}>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Owner</label>
                  <select className="form-select" value={owner} onChange={e => setOwner(e.target.value)}>
                    {["Francesco","Mamma","Emanuel","All"].map(o => <option key={o} value={o}>{o}</option>)}
                  </select>
                </div>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Due date</label>
                  <input className="form-input" placeholder="e.g. Jul 2026" value={dueDate} onChange={e => setDueDate(e.target.value)} />
                </div>
              </div>
              <div className="form-field">
                <label className="form-label">Note</label>
                <input className="form-input" placeholder="Any extra detail..." value={note} onChange={e => setNote(e.target.value)} />
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                <div onClick={() => setUrgent(!urgent)} style={{width:44,height:26,borderRadius:13,cursor:"pointer",background:urgent?"#f59e0b":"#e5e7eb",position:"relative",transition:"background 0.2s"}}>
                  <div style={{width:20,height:20,borderRadius:10,background:"#fff",position:"absolute",top:3,left:urgent?21:3,transition:"left 0.2s"}} />
                </div>
                <span style={{fontSize:13,color:"#374151"}}>Mark as urgent</span>
              </div>
              <button className="btn-primary" onClick={handleSave} disabled={saving}>{saving ? "Saving..." : isEdit ? "Save changes" : "Add task"}</button>
              {isEdit && !confirmDelete && (
                <button className="btn-danger" onClick={() => setConfirmDelete(true)}>
                  Delete task
                </button>
              )}
              {isEdit && confirmDelete && (
                <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:12,padding:"14px 16px",marginTop:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#dc2626",marginBottom:10}}>Delete this task permanently?</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={handleDelete} style={{flex:1,padding:"10px",background:"#dc2626",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Yes, delete</button>
                    <button onClick={() => setConfirmDelete(false)} style={{flex:1,padding:"10px",background:"#fff",color:"#374151",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,cursor:"pointer"}}>Cancel</button>

      function NotesThread({task, onAddNote}) {
        const [noteText, setNoteText] = useState("");
        const [adding, setAdding] = useState(false);
        const [editingIndex, setEditingIndex] = useState(null);
        const [editText, setEditText] = useState("");
        let notes = [];
        try { notes = JSON.parse(task.notes_thread || "[]"); } catch(e) {}

        async function handleAdd() {
          if (!noteText.trim()) return;
          setAdding(true);
          const newNote = { text: noteText.trim(), author: "Family", time: new Date().toLocaleDateString("en-GB", {day:"numeric",month:"short",hour:"2-digit",minute:"2-digit"}) };
          const updated = [...notes, newNote];
          await onAddNote(task.id, JSON.stringify(updated));
          setNoteText("");
          setAdding(false);
        }

        async function handleDelete(index) {
          const updated = notes.filter((_, i) => i !== index);
          await onAddNote(task.id, JSON.stringify(updated));
        }

        async function handleEdit(index) {
          if (!editText.trim()) return;
          const updated = notes.map((n, i) => i === index ? {...n, text: editText.trim(), edited: true} : n);
          await onAddNote(task.id, JSON.stringify(updated));
          setEditingIndex(null);
          setEditText("");
        }

        return (
          <div style={{marginTop:8}} onClick={e => e.stopPropagation()}>
            {notes.map((n, i) => (
              <div key={i} className="note-bubble" style={{marginBottom:6}}>
                <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:4}}>
                  <span style={{fontSize:11,color:"#9ca3af"}}>{n.author} · {n.time}{n.edited ? " (edited)" : ""}</span>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={() => { setEditingIndex(i); setEditText(n.text); }}
                      style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#9ca3af",padding:0}}>✏️</button>
                    <button onClick={() => handleDelete(i)}
                      style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#fca5a5",padding:0}}>✕</button>
                  </div>
                </div>
                {editingIndex === i ? (
                  <div style={{display:"flex",gap:6,marginTop:4}}>
                    <input className="note-input" value={editText} onChange={e => setEditText(e.target.value)}
                      onKeyDown={e => e.key === "Enter" && handleEdit(i)}
                      style={{flex:1}} autoFocus />
                    <button className="note-send-btn" onClick={() => handleEdit(i)}>Save</button>
                    <button onClick={() => setEditingIndex(null)}
                      style={{padding:"8px 10px",background:"none",border:"1.5px solid #e5e7eb",borderRadius:8,cursor:"pointer",fontSize:12,color:"#6b7280"}}>✕</button>
                  </div>
                ) : (
                  <div style={{fontSize:13,color:"#374151"}}>{n.text}</div>
                )}
              </div>
            ))}
            <div className="note-input-row">
              <input className="note-input" placeholder="Add update..." value={noteText} onChange={e => setNoteText(e.target.value)}
                onKeyDown={e => e.key === "Enter" && handleAdd()} />
              <button className="note-send-btn" onClick={handleAdd} disabled={adding}>
                {adding ? "..." : "Add"}
              </button>
            </div>
          </div>
        );
      }

      function TaskCard({task, onToggle, onEdit, onAddNote}) {
        const [completing, setCompleting] = useState(false);
        const [expanded, setExpanded] = useState(false);
        const pressTimer = useRef(null);
        const c = OWNER_COLORS[task.owner] || OWNER_COLORS.All;

        function handlePressStart() {
          pressTimer.current = setTimeout(() => { onEdit(task); }, 600);
        }
        function handlePressEnd() {
          clearTimeout(pressTimer.current);
        }
        async function handleComplete(e) {
          e.stopPropagation();
          if (!task.completed) {
            setCompleting(true);
            setTimeout(() => { onToggle(task.id, task.completed); setCompleting(false); }, 400);
          } else {
            onToggle(task.id, task.completed);
          }
        }

        return (
          <div className="task-card" style={{flexDirection:"column",padding:0,opacity:task.completed ? 0.55 : 1}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",padding:"13px 16px"}}
              onMouseDown={handlePressStart} onMouseUp={handlePressEnd}
              onTouchStart={handlePressStart} onTouchEnd={handlePressEnd}>
              <div onClick={handleComplete}
                style={{width:36,height:36,borderRadius:9,flexShrink:0,marginTop:-2,background:completing?"#22c55e":task.completed?"#1e6eb5":"#fff",border:"2px solid "+(completing?"#22c55e":task.completed?"#1e6eb5":"#d1d5db"),display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",minWidth:36,transition:"all 0.3s ease",transform:completing?"scale(1.15)":"scale(1)"}}>
                {(task.completed||completing) && <span style={{color:"#fff",fontSize:15,fontWeight:700}}>✓</span>}
              </div>
              <div style={{flex:1}}>
                <div style={{display:"flex",alignItems:"center",gap:8,flexWrap:"wrap",marginBottom:4}}>
                  <span style={{fontSize:14,fontWeight:500,color:task.completed?"#9ca3af":"#1a1a1a",textDecoration:task.completed?"line-through":"none"}}>{task.task_text}</span>
                  {task.urgent && !task.completed && <span style={{fontSize:10,fontWeight:600,background:"#fef3c7",color:"#92400e",padding:"2px 7px",borderRadius:10,border:"1px solid #fcd34d"}}>URGENT</span>}
                </div>
                <div style={{display:"flex",gap:8,flexWrap:"wrap",alignItems:"center"}}>
                  <span style={{fontSize:11,background:c.bg,color:c.text,padding:"2px 8px",borderRadius:10,fontWeight:500}}>{task.owner}</span>
                  {task.due_date && (() => {
                    const days = daysUntil(task.due_date);
                    const isNear = days !== null && days <= 7 && days >= 0;
                    const isOverdue = days !== null && days < 0;
                    return (
                      <span style={{fontSize:11,color:isOverdue?"#dc2626":isNear?"#d97706":"#9ca3af",fontWeight:isNear||isOverdue?600:400}}>
                        {task.due_date}{days !== null ? (isOverdue ? " · overdue" : days === 0 ? " · today" : " · in " + days + "d") : ""}
                      </span>
                    );
                  })()}
                  {task.note && <span style={{fontSize:11,color:"#6b7280",fontStyle:"italic"}}>· {task.note}</span>}
                </div>
              </div>
              <div style={{display:"flex",gap:6,flexShrink:0,alignItems:"center"}}>
                <button onClick={e => {e.stopPropagation();setExpanded(!expanded);}} style={{background:expanded?"#eff6ff":"#f8f9fa",border:"1px solid "+(expanded?"#bfdbfe":"#e5e7eb"),borderRadius:6,cursor:"pointer",fontSize:11,color:expanded?"#1e6eb5":"#9ca3af",padding:"3px 7px",fontWeight:500,display:"flex",alignItems:"center",gap:3}}>
                  💬 {(() => { try { return JSON.parse(task.notes_thread||"[]").length; } catch(e) { return 0; } })()} {expanded ? "▲" : "▼"}
                </button>
                <button onClick={e => {e.stopPropagation();onEdit(task);}} style={{background:"#f8f9fa",border:"1px solid #e5e7eb",borderRadius:6,cursor:"pointer",fontSize:11,color:"#9ca3af",padding:"3px 7px"}}>✏️</button>
              </div>
            </div>
            {expanded && (
              <div style={{padding:"0 16px 14px",borderTop:"1px solid #f0ede8"}}>
                <NotesThread task={task} onAddNote={onAddNote} />
              </div>
            )}
          </div>
        );
      }

      function Timeline() {
        return (
          <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,padding:"16px 20px"}}>
            <div style={{fontSize:15,fontWeight:600,color:"#1a1a1a",marginBottom:16}}>Key Dates</div>
            {KEY_DATES.map((item, i) => (
              <div key={i} style={{display:"flex",gap:0,marginBottom: i < KEY_DATES.length-1 ? 0 : 0}}>
                <div style={{display:"flex",flexDirection:"column",alignItems:"center",marginRight:12}}>
                  <div className="timeline-dot" style={{background: item.urgent ? "#dc2626" : item.color}} />
                  {i < KEY_DATES.length-1 && <div className="timeline-line" style={{height:36}} />}
                </div>
                <div style={{paddingBottom: i < KEY_DATES.length-1 ? 24 : 0}}>
                  <div style={{fontSize:11,color:"#9ca3af",marginBottom:2}}>{item.date}</div>
                  <div style={{fontSize:13,fontWeight:500,color:"#1a1a1a"}}>{item.label}</div>
                </div>
              </div>
            ))}
          </div>
        );
      }

      function daysUntil(dueDateStr) {
        if (!dueDateStr) return null;
        const dateMap = {
          'Immediately': 0, 'This week': 3, 'Book by end Jun 2026': 0,
          '2 Jul 2026': Math.round((new Date('2026-07-02')-new Date())/86400000),
          '5 Jul 2026': Math.round((new Date('2026-07-05')-new Date())/86400000),
          'Week of 7 Jul 2026': Math.round((new Date('2026-07-07')-new Date())/86400000),
          'Before Jul 2026': Math.round((new Date('2026-06-30')-new Date())/86400000),
          'July 2026': Math.round((new Date('2026-07-31')-new Date())/86400000),
          'Before 1 Aug 2026': Math.round((new Date('2026-08-01')-new Date())/86400000),
          'Before 31 Aug 2026': Math.round((new Date('2026-08-31')-new Date())/86400000),
          'August 2026': Math.round((new Date('2026-08-31')-new Date())/86400000),
        };
        return dateMap[dueDateStr] ?? null;
      }

      function App() {
        const [tasks, setTasks] = useState([]);
        const [loading, setLoading] = useState(true);
        const [activeTab, setActiveTab] = useState("tasks");
        const [activeCategory, setActiveCategory] = useState("All Tasks");
        const [activeOwner, setActiveOwner] = useState("All");
        const [editingTask, setEditingTask] = useState(null);
        const [showAdd, setShowAdd] = useState(false);
        const [seeded, setSeeded] = useState(false);
        const [showInstall, setShowInstall] = useState(true);
        const [showDone, setShowDone] = useState(false);
        const [quickFilter, setQuickFilter] = useState(null); // null | 'urgent' | 'done' | 'remaining'
        const [sortBy, setSortBy] = useState('default'); // 'default' | 'deadline'

        useEffect(() => {
          loadTasks();
          const ch = supabase.channel("tasks-v3")
            .on("postgres_changes", {event:"*",schema:"public",table:"tasks"}, () => loadTasks())
            .subscribe();
          return () => supabase.removeChannel(ch);
        }, []);

        async function loadTasks() {
          const {data, error} = await supabase.from("tasks").select("*").order("created_at");
          if (error) { setLoading(false); return; }
          if (data.length === 0 && !seeded) {
            setSeeded(true);
            await supabase.from("tasks").insert(INITIAL_TASKS);
            const {data:d2} = await supabase.from("tasks").select("*").order("created_at");
            setTasks(d2 || []);
          } else { setTasks(data); }
          setLoading(false);
        }

        async function toggleTask(id, completed) {
          await supabase.from("tasks").update({completed: !completed}).eq("id", id);
          setTasks(prev => prev.map(t => t.id === id ? {...t, completed: !completed} : t));
        }

        async function saveTask(taskData) {
          if (taskData.id) {
            await supabase.from("tasks").update(taskData).eq("id", taskData.id);
            setTasks(prev => prev.map(t => t.id === taskData.id ? {...t, ...taskData} : t));
          } else {
            const {data} = await supabase.from("tasks").insert([taskData]).select();
            if (data) setTasks(prev => [...prev, ...data]);
          }
        }

        async function deleteTask(id) {
          await supabase.from("tasks").delete().eq("id", id);
          setTasks(prev => prev.filter(t => t.id !== id));
        }

        async function addNote(id, notesThread) {
          await supabase.from("tasks").update({notes_thread: notesThread}).eq("id", id);
          setTasks(prev => prev.map(t => t.id === id ? {...t, notes_thread: notesThread} : t));
        }

        const allFiltered = tasks.filter(t =>
          (activeCategory === "All Tasks" || t.category === activeCategory) &&
          (activeOwner === "All" || t.owner === activeOwner)
        );
        const DATE_PRIORITY = {'Immediately':0,'This week':1,'Book by end Jun 2026':2,'2 Jul 2026':3,'5 Jul 2026':4,'Week of 7 Jul 2026':5,'Before Jul 2026':6,'July 2026':7,'Before 1 Aug 2026':8,'August 2026':9,'Before 31 Aug 2026':10,'Late Aug 2026':11,'As soon as found':12,'On contract signing':13,'Weekly check':14,'First week Amsterdam':15,'Day of arrival':16,'Within 5 days of arrival':17,'Before Emanuel arrives':18};
        const activeTasks = allFiltered.filter(t => {
          if (quickFilter === 'urgent') return t.urgent && !t.completed;
          if (quickFilter === 'remaining') return !t.completed;
          return !t.completed;
        }).sort((a,b) => {
          if (sortBy === 'deadline') {
            const ap = a.urgent ? -1 : (DATE_PRIORITY[a.due_date] ?? 99);
            const bp = b.urgent ? -1 : (DATE_PRIORITY[b.due_date] ?? 99);
            return ap - bp;
          }
          return 0;
        });
        const doneTasks = quickFilter === 'urgent' || quickFilter === 'remaining' ? [] : allFiltered.filter(t => t.completed);

        const completedCount = tasks.filter(t => t.completed).length;
        const totalCount = tasks.length;
        const urgentCount = tasks.filter(t => t.urgent && !t.completed).length;
        const progress = totalCount > 0 ? Math.round((completedCount / totalCount) * 100) : 0;

        return (
          <div style={{minHeight:"100vh",background:"#faf9f7",paddingBottom:80,paddingTop:showInstall?44:0}}>
            {showInstall && (
              <div className="install-banner">
                <div style={{fontSize:13,fontWeight:500}}>Install on iPhone: tap Share then "Add to Home Screen"</div>
                <button onClick={() => setShowInstall(false)} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer",lineHeight:1}}>×</button>
              </div>
            )}

            <div style={{background:"#fff",borderBottom:"1px solid #e5e3df",padding:"0 20px",position:"sticky",top:0,zIndex:10}}>
              <div style={{maxWidth:860,margin:"0 auto"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0 10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <GIcon size={44} />
                    <div>
                      <div style={{fontSize:18,fontWeight:700,color:"#1a1a1a",fontFamily:"Futura,Century Gothic,sans-serif"}}>Guarracino</div>
                      <div style={{fontSize:10,color:"#9ca3af",letterSpacing:"2px",fontFamily:"Futura,Century Gothic,sans-serif"}}>FAMILY</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:24,fontWeight:700,color:"#1e6eb5"}}>{progress}%</div>
                    <div style={{fontSize:11,color:"#9ca3af"}}>{completedCount}/{totalCount} done</div>
                  </div>
                <div style={{marginBottom:10}}>
                  <div style={{height:10,background:"#e5e7eb",borderRadius:5,overflow:"hidden"}}>
                    <div style={{height:"100%",width:progress+"%",background:"linear-gradient(90deg,#60a5fa,#1e6eb5)",borderRadius:5,transition:"width 0.6s ease",minWidth:progress>0?"10px":"0"}} />
                  </div>
                  {progress > 0 && <div style={{fontSize:10,color:"#1e6eb5",fontWeight:600,textAlign:"right",marginTop:2}}>{progress}% complete</div>}
                </div>
                <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                  {urgentCount > 0 && (
                    <button onClick={() => { setQuickFilter(quickFilter==='urgent'?null:'urgent'); setActiveTab('tasks'); }}
                      style={{background:quickFilter==='urgent'?"#f59e0b":"#fef3c7",border:"1px solid #fcd34d",borderRadius:20,padding:"3px 10px",fontSize:11,color:quickFilter==='urgent'?"#fff":"#92400e",fontWeight:500,cursor:"pointer"}}>
                      ⚡ {urgentCount} urgent
                    </button>
                  )}
                  <button onClick={() => { setQuickFilter(quickFilter==='done'?null:'done'); setShowDone(true); setActiveTab('tasks'); }}
                    style={{background:quickFilter==='done'?"#166534":"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:20,padding:"3px 10px",fontSize:11,color:quickFilter==='done'?"#fff":"#166534",fontWeight:500,cursor:"pointer"}}>
                    {completedCount} done
                  </button>
                  <span style={{background:"#f8f9fa",border:"1px solid #e5e7eb",borderRadius:20,padding:"3px 10px",fontSize:11,color:"#6b7280",fontWeight:500}}>
                    {totalCount - completedCount} remaining
                  </span>
                </div>
                <div style={{display:"flex"}}>
                  {[["tasks","Tasks"],["timeline","Timeline"],["housing","Housing"],["budget","Budget"]].map(([key,label]) => (
                    <button key={key} onClick={() => setActiveTab(key)} style={{padding:"9px 14px",fontSize:13,fontWeight:500,background:"none",border:"none",cursor:"pointer",borderBottom:activeTab===key?"2px solid #1e6eb5":"2px solid transparent",color:activeTab===key?"#1e6eb5":"#6b7280"}}>{label}</button>
                  ))}
                </div>
              </div>
            </div>

            <div style={{maxWidth:860,margin:"0 auto",padding:"20px"}}>

              {activeTab === "tasks" && (
                <div>
                  <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                    {OWNERS.map(owner => {
                      const c = OWNER_COLORS[owner] || OWNER_COLORS.All;
                      return <button key={owner} onClick={() => setActiveOwner(owner)} style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:500,cursor:"pointer",background:activeOwner===owner?(owner==="All"?"#1a1a1a":c.bg):"#fff",color:activeOwner===owner?(owner==="All"?"#fff":c.text):"#6b7280",border:"1.5px solid "+(activeOwner===owner?(owner==="All"?"#1a1a1a":c.border):"#e5e7eb")}}>{owner}</button>;
                    })}
                  </div>
                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{fontSize:11,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"0.5px"}}>Sort</div>
                    <div style={{display:"flex",gap:6}}>
                      <button onClick={()=>setSortBy('default')} style={{padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",background:sortBy==='default'?"#1e6eb5":"#fff",color:sortBy==='default'?"#fff":"#6b7280",border:"1.5px solid "+(sortBy==='default'?"#1e6eb5":"#e5e7eb")}}>Default</button>
                      <button onClick={()=>setSortBy('deadline')} style={{padding:"3px 10px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",background:sortBy==='deadline'?"#1e6eb5":"#fff",color:sortBy==='deadline'?"#fff":"#6b7280",border:"1.5px solid "+(sortBy==='deadline'?"#1e6eb5":"#e5e7eb")}}>By deadline</button>
                    </div>
                  </div>
                  <div style={{display:"flex",gap:6,marginBottom:18,flexWrap:"wrap"}}>
                    {ALL_CATEGORIES.map(cat => (
                      <button key={cat} onClick={() => setActiveCategory(cat)} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",background:activeCategory===cat?"#1e6eb5":"#fff",color:activeCategory===cat?"#fff":"#6b7280",border:"1.5px solid "+(activeCategory===cat?"#1e6eb5":"#e5e7eb")}}>{cat}</button>
                    ))}
                  </div>

                  {loading ? <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>Loading...</div> : (
                    <div>
                      {activeTasks.length === 0 && doneTasks.length === 0 && quickFilter !== 'done' && (
                        <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>No tasks here.</div>
                      )}
                      {quickFilter === 'done' ? (
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {allFiltered.filter(t=>t.completed).length === 0
                            ? <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>No completed tasks yet.</div>
                            : allFiltered.filter(t=>t.completed).map(task => (
                              <TaskCard key={task.id} task={task} onToggle={toggleTask} onEdit={setEditingTask} onAddNote={addNote} />
                            ))
                          }
                        </div>
                      ) : (
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {activeTasks.map(task => (
                            <TaskCard key={task.id} task={task} onToggle={toggleTask} onEdit={setEditingTask} onAddNote={addNote} />
                          ))}
                        </div>
                      )}

                      {doneTasks.length > 0 && (
                        <div>
                          <button onClick={() => setShowDone(!showDone)} style={{background:"none",border:"none",cursor:"pointer",display:"flex",alignItems:"center",gap:6,marginTop:20,marginBottom:8}}>
                            <span style={{fontSize:12,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"1px"}}>
                              {showDone ? "▼" : "▶"} Completed ({doneTasks.length})
                            </span>
                          </button>
                          {showDone && (
                            <div style={{display:"flex",flexDirection:"column",gap:8}}>
                              {doneTasks.map(task => (
                                <TaskCard key={task.id} task={task} onToggle={toggleTask} onEdit={setEditingTask} onAddNote={addNote} />
                              ))}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {activeTab === "timeline" && <Timeline />}

              {activeTab === "housing" && (
                <div>
                  <div style={{marginBottom:20}}>
                    <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a",marginBottom:4}}>Housing Platforms</div>
                    <div style={{fontSize:13,color:"#6b7280"}}>Register on all 5. More registrations = better chances.</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {HOUSING_AGENCIES.map(agency => (
                      <a key={agency.name} href={agency.url} target="_blank" rel="noopener noreferrer">
                        <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,padding:"15px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",borderLeft:"4px solid "+agency.color}}>
                          <div style={{flex:1}}>
                            <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                              <span style={{fontSize:14,fontWeight:600,color:"#1a1a1a"}}>{agency.name}</span>
                              <span style={{fontSize:10,fontWeight:600,color:agency.color,padding:"2px 7px",borderRadius:10,border:"1px solid "+agency.color}}>{agency.badge}</span>
                            </div>
                            <div style={{fontSize:12,color:"#6b7280"}}>{agency.desc}</div>
                          </div>
                          <div style={{color:"#9ca3af",fontSize:16}}>→</div>
                        </div>
                      </a>
                    ))}
                  </div>
                </div>
              )}

              {activeTab === "budget" && (
                <div>
                  <div style={{marginBottom:24}}>
                    <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a",marginBottom:4}}>One-Off Setup Costs</div>
                    <div style={{fontSize:13,color:"#6b7280",marginBottom:14}}>Total estimate: 7,000–10,000 EUR</div>
                    <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,overflow:"hidden"}}>
                      {ONE_OFF.map((row,i) => (
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:i<ONE_OFF.length-1?"1px solid #f0ede8":"none",background:i%2===0?"#fff":"#faf9f7"}}>
                          <span style={{fontSize:13,color:"#374151"}}>{row.item}</span>
                          <div style={{display:"flex",gap:14,alignItems:"center"}}>
                            <span style={{fontSize:12,color:"#9ca3af"}}>{row.who}</span>
                            <span style={{fontSize:13,fontWeight:600,color:"#1a1a1a",minWidth:80,textAlign:"right"}}>{row.eur}</span>
                          </div>
                        </div>
                      ))}
                    </div>
                  </div>
                  <div>
                    <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a",marginBottom:4}}>Monthly Running Costs</div>
                    <div style={{fontSize:13,color:"#6b7280",marginBottom:14}}>1,425–1,820 EUR/month</div>
                    <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,overflow:"hidden"}}>
                      {MONTHLY.map((row,i) => (
                        <div key={i} style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"10px 16px",borderBottom:i<MONTHLY.length-1?"1px solid #f0ede8":"none",background:i%2===0?"#fff":"#faf9f7"}}>
                          <span style={{fontSize:13,color:"#374151"}}>{row.item}</span>
                          <span style={{fontSize:13,fontWeight:600,color:"#1a1a1a"}}>{row.eur}</span>
                        </div>
                      ))}
                      <div style={{display:"flex",justifyContent:"space-between",padding:"12px 16px",background:"#eff6ff",borderTop:"2px solid #bfdbfe"}}>
                        <span style={{fontSize:13,fontWeight:700,color:"#1e40af"}}>Monthly Total</span>
                        <span style={{fontSize:13,fontWeight:700,color:"#1e40af"}}>1,425–1,820 EUR</span>
                      </div>
                    </div>
                  </div>
                </div>
              )}
            </div>

            {activeTab === "tasks" && (
              <button className="add-fab" onClick={() => setShowAdd(true)}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/>
                </svg>
              </button>
            )}

            {showAdd && (
              <TaskModal onClose={() => setShowAdd(false)} onSave={saveTask} onDelete={deleteTask} />
            )}
            {editingTask && (
              <TaskModal task={editingTask} onClose={() => setEditingTask(null)} onSave={saveTask} onDelete={deleteTask} />
            )}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(<App />);
    </script>
  </body>
</html>
