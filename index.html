      function NotesThread(props) {
        var task = props.task;
        var onAddNote = props.onAddNote;
        var notes = [];
        try { notes = JSON.parse(task.notes_thread || "[]"); } catch(e) {}
        var [noteText, setNoteText] = useState("");
        var [adding, setAdding] = useState(false);
        var [editingIndex, setEditingIndex] = useState(null);
        var [editText, setEditText] = useState("");

        function handleAdd() {
          if (!noteText.trim()) return;
          setAdding(true);
          var d = new Date();
          var newNote = { text: noteText.trim(), author: "Family", time: d.getDate() + " " + d.toLocaleString('en',{month:'short'}) + " " + d.getHours() + ":" + String(d.getMinutes()).padStart(2,'0') };
          var updated = notes.concat([newNote]);
          onAddNote(task.id, JSON.stringify(updated));
          setNoteText("");
          setAdding(false);
        }

        function handleDelete(index) {
          var updated = notes.filter(function(_,i){ return i !== index; });
          onAddNote(task.id, JSON.stringify(updated));
        }

        function handleEdit(index) {
          if (!editText.trim()) return;
          var updated = notes.map(function(n,i){ return i === index ? Object.assign({},n,{text:editText.trim(),edited:true}) : n; });
          onAddNote(task.id, JSON.stringify(updated));
          setEditingIndex(null);
          setEditText("");
        }

        return (
          <div style={{marginTop:8}} onClick={function(e){e.stopPropagation();}}>
            {notes.map(function(n,i) {
              return (
                <div key={i} className="note-bubble">
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                    <span style={{fontSize:11,color:"#9ca3af"}}>{n.author} - {n.time}{n.edited?" (edited)":""}</span>
                    <div style={{display:"flex",gap:8}}>
                      <button onClick={function(){setEditingIndex(i);setEditText(n.text);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#9ca3af"}}>edit</button>
                      <button onClick={function(){handleDelete(i);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,color:"#fca5a5"}}>delete</button>
                    </div>
                  </div>
                  {editingIndex === i ? (
                    <div style={{display:"flex",gap:6}}>
                      <input className="note-input" value={editText} onChange={function(e){setEditText(e.target.value);}} style={{flex:1}} autoFocus />
                      <button className="note-send-btn" onClick={function(){handleEdit(i);}}>Save</button>
                      <button onClick={function(){setEditingIndex(null);}} style={{padding:"8px 10px",background:"none",border:"1.5px solid #e5e7eb",borderRadius:8,cursor:"pointer",fontSize:12}}>x</button>
                    </div>
                  ) : (
                    <div style={{fontSize:13}}>{n.text}</div>
                  )}
                </div>
              );
            })}
            <div className="note-input-row">
              <input className="note-input" placeholder="Add update..." value={noteText} onChange={function(e){setNoteText(e.target.value);}} onKeyDown={function(e){if(e.key==="Enter")handleAdd();}} />
              <button className="note-send-btn" onClick={handleAdd} disabled={adding}>{adding?"...":"Add"}</button>
            </div>
          </div>
        );
      }

      function TaskModal(props) {
        var task = props.task;
        var onClose = props.onClose;
        var onSave = props.onSave;
        var onDelete = props.onDelete;
        var isEdit = !!task;
        var [text, setText] = useState(task ? task.task_text : "");
        var [category, setCategory] = useState(task ? task.category : CATEGORIES[0]);
        var [owner, setOwner] = useState(task ? task.owner : "Emanuel");
        var [dueDate, setDueDate] = useState(task ? task.due_date : "");
        var [note, setNote] = useState(task ? task.note : "");
        var [urgent, setUrgent] = useState(task ? task.urgent : false);
        var [saving, setSaving] = useState(false);
        var [confirmDelete, setConfirmDelete] = useState(false);

        function handleSave() {
          if (!text.trim()) return;
          setSaving(true);
          onSave(Object.assign({}, task||{}, {task_text:text.trim(),category:category,owner:owner,due_date:dueDate,note:note,urgent:urgent,completed:task?task.completed:false,notes_thread:task?task.notes_thread:"[]"}));
          setSaving(false);
          onClose();
        }

        function handleDelete() {
          onDelete(task.id);
          onClose();
        }

        return (
          <div className="modal-overlay" onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
            <div className="modal-box">
              <div className="modal-title">{isEdit?"Edit task":"Add new task"}</div>
              <div className="form-field">
                <label className="form-label">Task</label>
                <input className="form-input" placeholder="What needs to be done?" value={text} onChange={function(e){setText(e.target.value);}} autoFocus />
              </div>
              <div className="form-field">
                <label className="form-label">Category</label>
                <select className="form-select" value={category} onChange={function(e){setCategory(e.target.value);}}>
                  {CATEGORIES.map(function(c){return <option key={c} value={c}>{c}</option>;})}
                </select>
              </div>
              <div style={{display:"flex",gap:10}}>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Owner</label>
                  <select className="form-select" value={owner} onChange={function(e){setOwner(e.target.value);}}>
                    {["Francesco","Mamma","Emanuel","All"].map(function(o){return <option key={o} value={o}>{o}</option>;})}
                  </select>
                </div>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Due date</label>
                  <input className="form-input" placeholder="e.g. Jul 2026" value={dueDate} onChange={function(e){setDueDate(e.target.value);}} />
                </div>
              </div>
              <div className="form-field">
                <label className="form-label">Note</label>
                <input className="form-input" placeholder="Any extra detail..." value={note} onChange={function(e){setNote(e.target.value);}} />
              </div>
              <div style={{display:"flex",alignItems:"center",gap:10,marginBottom:16}}>
                <div onClick={function(){setUrgent(!urgent);}} style={{width:44,height:26,borderRadius:13,cursor:"pointer",background:urgent?"#f59e0b":"#e5e7eb",position:"relative",transition:"background 0.2s"}}>
                  <div style={{width:20,height:20,borderRadius:10,background:"#fff",position:"absolute",top:3,left:urgent?21:3,transition:"left 0.2s"}} />
                </div>
                <span style={{fontSize:13,color:"#374151"}}>Mark as urgent</span>
              </div>
              <button className="btn-primary" onClick={handleSave} disabled={saving}>{saving?"Saving...":isEdit?"Save changes":"Add task"}</button>
              {isEdit && !confirmDelete && (
                <button className="btn-danger" onClick={function(){setConfirmDelete(true);}}>Delete task</button>
              )}
              {isEdit && confirmDelete && (
                <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:12,padding:"14px 16px",marginTop:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#dc2626",marginBottom:10}}>Delete permanently?</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={handleDelete} style={{flex:1,padding:"10px",background:"#dc2626",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Yes, delete</button>
                    <button onClick={function(){setConfirmDelete(false);}} style={{flex:1,padding:"10px",background:"#fff",color:"#374151",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,cursor:"pointer"}}>Cancel</button>
                  </div>
                </div>
              )}
              <button className="btn-cancel" onClick={onClose}>Cancel</button>
            </div>
          </div>
        );
      }

      function TaskCard(props) {
        var task = props.task;
        var onToggle = props.onToggle;
        var onEdit = props.onEdit;
        var onAddNote = props.onAddNote;
        var [expanded, setExpanded] = useState(false);
        var [completing, setCompleting] = useState(false);
        var c = OWNER_COLORS[task.owner] || OWNER_COLORS.All;
        var noteCount = 0;
        try { noteCount = JSON.parse(task.notes_thread || "[]").length; } catch(e) {}

        function handleCheck(e) {
          e.stopPropagation();
          if (!task.completed) {
            setCompleting(true);
            setTimeout(function(){ onToggle(task.id, task.completed); setCompleting(false); }, 350);
          } else {
            onToggle(task.id, task.completed);
          }
        }

        return (
          <div style={{background:task.completed?"#fafafa":"#fff",border:"1px solid "+(task.completed?"#f0ede8":"#e5e3df"),borderRadius:10,overflow:"hidden",boxShadow:task.completed?"none":"0 1px 3px rgba(0,0,0,0.04)",opacity:task.completed?0.6:1,transition:"opacity 0.3s"}}>
            <div style={{display:"flex",gap:12,alignItems:"flex-start",padding:"13px 16px"}}>
              <div onClick={handleCheck} style={{width:36,height:36,borderRadius:9,flexShrink:0,marginTop:-2,background:completing?"#22c55e":task.completed?"#1e6eb5":"#fff",border:"2px solid "+(completing?"#22c55e":task.completed?"#1e6eb5":"#d1d5db"),display:"flex",alignItems:"center",justifyContent:"center",cursor:"pointer",minWidth:36,transition:"all 0.3s"}}>
                {(task.completed||completing) && <span style={{color:"#fff",fontSize:15,fontWeight:700}}>v</span>}

      function BudgetRow(props) {
        var row = props.row;

        var [editing, setEditing] = useState(false);

        function handleSave() {
          onSave(row.id, {item:item, eur:eur, who:who});

          onDelete(row.id);

      function SpendingTracker() {
        var [entries, setEntries] = useState([]);
        var [loading, setLoading] = useState(true);
        var [showAdd, setShowAdd] = useState(false);
        var [editEntry, setEditEntry] = useState(null);
        var [monthlyBudget, setMonthlyBudget] = useState(function(){ try { return parseFloat(localStorage.getItem("eman_budget")||"1600"); } catch(e){ return 1600; } });
        var [editingBudget, setEditingBudget] = useState(false);
        var [budgetInput, setBudgetInput] = useState("");
        var today = new Date();
        var [viewMonth, setViewMonth] = useState(today.getMonth());
        var [viewYear, setViewYear] = useState(today.getFullYear());

        useEffect(function(){
          function load() {
            supabase.from("spending").select("*").eq("person","Emanuel").order("spend_date",{ascending:false}).then(function(r){
              if (r.error) { setLoading(false); return; }
              setEntries(r.data || []);
              setLoading(false);
            });
          }
          load();
          var ch = supabase.channel("spending-changes").on("postgres_changes",{event:"*",schema:"public",table:"spending"},load).subscribe();
          return function(){ supabase.removeChannel(ch); };
        }, []);

        function addEntry(data) {
          supabase.from("spending").insert([Object.assign({person:"Emanuel"},data)]).select().then(function(r){
            if(r.data) setEntries(function(prev){return r.data.concat(prev);});
          });
        }

        function updateEntry(id, data) {
          supabase.from("spending").update(data).eq("id",id).then(function(){
            setEntries(function(prev){return prev.map(function(e){return e.id===id?Object.assign({},e,data):e;});});
          });
        }

        function deleteEntry(id) {
          supabase.from("spending").delete().eq("id",id).then(function(){
            setEntries(function(prev){return prev.filter(function(e){return e.id!==id;});});
          });
        }

        // Filter to selected month
        var monthEntries = entries.filter(function(e){
          var d = new Date(e.spend_date);
          return d.getMonth()===viewMonth && d.getFullYear()===viewYear;
        });

        var monthTotal = monthEntries.reduce(function(sum,e){return sum+parseFloat(e.amount);},0);

        // Group by category for summary
        var byCat = {};
        monthEntries.forEach(function(e){
          if (!byCat[e.category]) byCat[e.category] = 0;
          byCat[e.category] += parseFloat(e.amount);
        });
        var catList = Object.keys(byCat).sort(function(a,b){return byCat[b]-byCat[a];});

        var monthNames = ["Jan","Feb","Mar","Apr","May","Jun","Jul","Aug","Sep","Oct","Nov","Dec"];

        function prevMonth() {
          if (viewMonth===0) { setViewMonth(11); setViewYear(viewYear-1); }
          else setViewMonth(viewMonth-1);
        }
        function nextMonth() {
          if (viewMonth===11) { setViewMonth(0); setViewYear(viewYear+1); }
          else setViewMonth(viewMonth+1);
        }

        return (
          <div>
            {/* Header */}
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a"}}>Emanuel's Spending</div>
                <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>Monthly tracker</div>
              </div>
              <button onClick={function(){setEditEntry(null);setShowAdd(true);}} style={{padding:"8px 16px",background:"#1e6eb5",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Add</button>
            </div>

            {/* Month navigator */}
            <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",background:"#fff",border:"1px solid #e5e3df",borderRadius:12,padding:"12px 16px",marginBottom:16}}>
              <button onClick={prevMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#6b7280",padding:"0 8px"}}>←</button>
              <div style={{textAlign:"center"}}>
                <div style={{fontSize:16,fontWeight:700,color:"#1a1a1a"}}>{monthNames[viewMonth]} {viewYear}</div>
                <div style={{fontSize:22,fontWeight:700,color:"#1e6eb5",marginTop:2}}>EUR {monthTotal.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
              </div>
              <button onClick={nextMonth} style={{background:"none",border:"none",cursor:"pointer",fontSize:18,color:"#6b7280",padding:"0 8px"}}>→</button>
            </div>

            {/* Monthly budget target */}
            <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,padding:"12px 16px",marginBottom:16}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:12,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"1px"}}>Monthly Budget</span>
                {!editingBudget && <button onClick={function(){setBudgetInput(String(monthlyBudget));setEditingBudget(true);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:11,color:"#1e6eb5"}}>Edit</button>}
              </div>
              {editingBudget ? (
                <div style={{display:"flex",gap:8}}>
                  <input value={budgetInput} onChange={function(e){setBudgetInput(e.target.value);}} style={{flex:1,padding:"6px 10px",border:"1.5px solid #1e6eb5",borderRadius:8,fontSize:14,outline:"none"}} type="number" autoFocus />
                  <button onClick={function(){ var v=parseFloat(budgetInput); if(!isNaN(v)){ setMonthlyBudget(v); try{localStorage.setItem("eman_budget",String(v));}catch(e){} } setEditingBudget(false); }} style={{padding:"6px 12px",background:"#1e6eb5",color:"#fff",border:"none",borderRadius:8,fontSize:12,cursor:"pointer"}}>Save</button>
                  <button onClick={function(){setEditingBudget(false);}} style={{padding:"6px 10px",background:"#fff",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:12,cursor:"pointer"}}>x</button>
                </div>
              ) : (
                <div>
                  <div style={{display:"flex",justifyContent:"space-between",marginBottom:6}}>
                    <span style={{fontSize:13,color:"#374151"}}>EUR {monthTotal.toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2})} spent</span>
                    <span style={{fontSize:13,fontWeight:600,color:monthTotal>monthlyBudget?"#dc2626":"#166534"}}>
                      {monthTotal>monthlyBudget ? "EUR "+(monthTotal-monthlyBudget).toFixed(2)+" over" : "EUR "+(monthlyBudget-monthTotal).toFixed(2)+" left"}
                    </span>
                  </div>
                  <div style={{height:8,background:"#f0ede8",borderRadius:4,overflow:"hidden"}}>
                    <div style={{height:"100%",width:Math.min((monthTotal/monthlyBudget)*100,100)+"%",background:monthTotal>monthlyBudget?"#dc2626":monthTotal/monthlyBudget>0.8?"#f59e0b":"#1e6eb5",borderRadius:4,transition:"width 0.4s"}} />
                  </div>
                  <div style={{fontSize:11,color:"#9ca3af",marginTop:4,textAlign:"right"}}>Budget: EUR {monthlyBudget.toLocaleString()}/month</div>
                </div>
              )}
            </div>

            {/* Category breakdown */}
            {catList.length > 0 && (
              <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,padding:"14px 16px",marginBottom:16}}>
                <div style={{fontSize:12,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"1px",marginBottom:12}}>By Category</div>
                {catList.map(function(cat){
                  var pct = Math.round((byCat[cat]/monthTotal)*100);
                  var color = SPEND_COLORS[cat] || "#9ca3af";
                  return (
                    <div key={cat} style={{marginBottom:10}}>
                      <div style={{display:"flex",justifyContent:"space-between",marginBottom:4}}>
                        <span style={{fontSize:13,color:"#374151"}}>{cat}</span>
                        <span style={{fontSize:13,fontWeight:600,color:"#1a1a1a"}}>EUR {byCat[cat].toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2})} <span style={{fontSize:11,color:"#9ca3af",fontWeight:400}}>({pct}%)</span></span>
                      </div>
                      <div style={{height:6,background:"#f0ede8",borderRadius:3,overflow:"hidden"}}>
                        <div style={{height:"100%",width:pct+"%",background:color,borderRadius:3,transition:"width 0.4s"}} />
                      </div>
                    </div>
                  );
                })}
              </div>
            )}

            {/* Entries list */}
            {loading ? <div style={{textAlign:"center",padding:40,color:"#9ca3af"}}>Loading...</div> : (
              <div>
                {monthEntries.length===0 && (
                  <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>
                    <div style={{fontSize:32,marginBottom:12}}>💶</div>
                    <div style={{fontSize:14,fontWeight:500,marginBottom:6}}>No spending logged</div>
                    <div style={{fontSize:13}}>Tap + Add to log first expense</div>
                  </div>
                )}
                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                  {monthEntries.map(function(e){
                    var color = SPEND_COLORS[e.category] || "#9ca3af";
                    return (
                      <div key={e.id} onClick={function(){setEditEntry(e);setShowAdd(true);}} style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:10,padding:"12px 16px",cursor:"pointer",display:"flex",alignItems:"center",gap:12,boxShadow:"0 1px 3px rgba(0,0,0,0.04)"}}>
                        <div style={{width:36,height:36,borderRadius:9,background:color+"18",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                          <div style={{width:10,height:10,borderRadius:5,background:color}} />
                        </div>
                        <div style={{flex:1}}>
                          <div style={{fontSize:14,fontWeight:500,color:"#1a1a1a"}}>{e.description || e.category}</div>
                          <div style={{fontSize:11,color:"#9ca3af",marginTop:2}}>{e.category} · {new Date(e.spend_date).toLocaleDateString("en-GB",{day:"numeric",month:"short"})}</div>
                        </div>
                        <div style={{fontSize:15,fontWeight:700,color:"#1a1a1a"}}>EUR {parseFloat(e.amount).toLocaleString("en",{minimumFractionDigits:2,maximumFractionDigits:2})}</div>
                      </div>
                    );
                  })}
                </div>
              </div>
            )}

            {/* Add/Edit Modal */}
            {showAdd && (
              <SpendingModal
                entry={editEntry}
                onClose={function(){setShowAdd(false);setEditEntry(null);}}
                onSave={function(data){ if(editEntry){updateEntry(editEntry.id,data);}else{addEntry(data);} setShowAdd(false);setEditEntry(null); }}
                onDelete={function(id){deleteEntry(id);setShowAdd(false);setEditEntry(null);}}
              />
            )}
          </div>
        );
      }

      function SpendingModal(props) {
        var entry = props.entry;
        var isEdit = !!entry;
        var [amount, setAmount] = useState(entry ? String(entry.amount) : "");
        var [category, setCategory] = useState(entry ? entry.category : SPEND_CATEGORIES[0]);
        var [description, setDescription] = useState(entry ? entry.description : "");
        var [spendDate, setSpendDate] = useState(entry ? entry.spend_date : new Date().toISOString().split("T")[0]);
        var [confirm, setConfirm] = useState(false);
        var [saving, setSaving] = useState(false);

        function handleSave() {
          if (!amount || isNaN(parseFloat(amount))) return;
          setSaving(true);
          props.onSave({amount:parseFloat(amount),category:category,description:description,spend_date:spendDate});
        }

        return (
          <div className="modal-overlay" onClick={function(e){if(e.target===e.currentTarget)props.onClose();}}>
            <div className="modal-box">
              <div className="modal-title">{isEdit?"Edit expense":"Add expense"}</div>
              <div className="form-field">
                <label className="form-label">Amount (EUR)</label>
                <input className="form-input" type="number" placeholder="0.00" value={amount} onChange={function(e){setAmount(e.target.value);}} autoFocus style={{fontSize:22,fontWeight:700}} />
              </div>
              <div className="form-field">
                <label className="form-label">Category</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {SPEND_CATEGORIES.map(function(cat){
                    var color = SPEND_COLORS[cat] || "#9ca3af";
                    return (
                      <button key={cat} onClick={function(){setCategory(cat);}} style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:500,cursor:"pointer",background:category===cat?color:"#fff",color:category===cat?"#fff":color,border:"1.5px solid "+color}}>
                        {cat}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div className="form-field">
                <label className="form-label">Description (optional)</label>
                <input className="form-input" placeholder="e.g. Albert Heijn weekly shop" value={description} onChange={function(e){setDescription(e.target.value);}} />
              </div>
              <div className="form-field">
                <label className="form-label">Date</label>
                <input className="form-input" type="date" value={spendDate} onChange={function(e){setSpendDate(e.target.value);}} />
              </div>
              <button className="btn-primary" onClick={handleSave} disabled={saving} style={{opacity:saving?0.7:1}}>{saving?"Saving...":isEdit?"Save changes":"Add expense"}</button>
              {isEdit && !confirm && <button className="btn-danger" onClick={function(){setConfirm(true);}}>Delete expense</button>}
              {isEdit && confirm && (
                <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:12,padding:"14px 16px",marginTop:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#dc2626",marginBottom:10}}>Delete this expense?</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={function(){props.onDelete(entry.id);}} style={{flex:1,padding:"10px",background:"#dc2626",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Yes, delete</button>
                    <button onClick={function(){setConfirm(false);}} style={{flex:1,padding:"10px",background:"#fff",color:"#374151",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,cursor:"pointer"}}>Cancel</button>
                  </div>
                </div>
              )}
              <button className="btn-cancel" onClick={props.onClose}>Cancel</button>
            </div>
          </div>
        );
      }

      var APPT_STATUSES = [
        {key:"considering", label:"Considering", color:"#6b7280", bg:"#f3f4f6"},
        {key:"viewing",     label:"Viewing",     color:"#d97706", bg:"#fef3c7"},
        {key:"applied",     label:"Applied",     color:"#1e6eb5", bg:"#dbeafe"},
        {key:"offer",       label:"Offer Made",  color:"#7c3aed", bg:"#ede9fe"},
        {key:"accepted",    label:"Accepted",    color:"#166534", bg:"#dcfce7"},
        {key:"rejected",    label:"Rejected",    color:"#dc2626", bg:"#fee2e2"},
      ];

      function statusInfo(key) {
        return APPT_STATUSES.find(function(s){return s.key===key;}) || APPT_STATUSES[0];
      }

      function ApartmentModal(props) {
        var apt = props.apt;
        var onClose = props.onClose;
        var onSave = props.onSave;
        var onDelete = props.onDelete;
        var isEdit = !!apt;
        var [name, setName] = useState(apt ? apt.name : "");
        var [address, setAddress] = useState(apt ? apt.address : "");
        var [price, setPrice] = useState(apt ? apt.price : "");
        var [landlord, setLandlord] = useState(apt ? apt.landlord : "");
        var [phone, setPhone] = useState(apt ? apt.phone : "");
        var [link, setLink] = useState(apt ? apt.link : "");
        var [status, setStatus] = useState(apt ? apt.status : "considering");
        var [pros, setPros] = useState(apt ? apt.pros : "");
        var [cons, setCons] = useState(apt ? apt.cons : "");
        var [notes, setNotes] = useState(apt ? apt.notes : "");
        var [photoUrl, setPhotoUrl] = useState(apt ? apt.photo_url : "");
        var [confirm, setConfirm] = useState(false);

        function handleSave() {
          if (!name.trim()) return;
          onSave({id:apt?apt.id:null, name:name.trim(), address, price, landlord, phone, link, status, pros, cons, notes, photo_url:photoUrl});
          onClose();
        }

        return (
          <div className="modal-overlay" onClick={function(e){if(e.target===e.currentTarget)onClose();}}>
            <div className="modal-box">
              <div className="modal-title">{isEdit ? "Edit apartment" : "Add apartment"}</div>
              <div className="form-field">
                <label className="form-label">Name / Reference</label>
                <input className="form-input" placeholder="e.g. Studio De Pijp, Frederiksstraat" value={name} onChange={function(e){setName(e.target.value);}} autoFocus />
              </div>
              <div className="form-field">
                <label className="form-label">Status</label>
                <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                  {APPT_STATUSES.map(function(s){
                    return (
                      <button key={s.key} onClick={function(){setStatus(s.key);}} style={{padding:"5px 12px",borderRadius:20,fontSize:12,fontWeight:500,cursor:"pointer",background:status===s.key?s.color:s.bg,color:status===s.key?"#fff":s.color,border:"1.5px solid "+s.color}}>
                        {s.label}
                      </button>
                    );
                  })}
                </div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Price / month</label>
                  <input className="form-input" placeholder="e.g. 900 EUR" value={price} onChange={function(e){setPrice(e.target.value);}} />
                </div>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Address</label>
                  <input className="form-input" placeholder="Street, Amsterdam" value={address} onChange={function(e){setAddress(e.target.value);}} />
                </div>
              </div>
              <div style={{display:"flex",gap:10}}>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Landlord name</label>
                  <input className="form-input" placeholder="Name" value={landlord} onChange={function(e){setLandlord(e.target.value);}} />
                </div>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Phone / WhatsApp</label>
                  <input className="form-input" placeholder="+31..." value={phone} onChange={function(e){setPhone(e.target.value);}} />
                </div>
              </div>
              <div className="form-field">
                <label className="form-label">Listing URL</label>
                <input className="form-input" placeholder="https://housinganywhere.com/..." value={link} onChange={function(e){setLink(e.target.value);}} />
              </div>
              <div className="form-field">
                <label className="form-label">Photo URL</label>
                <input className="form-input" placeholder="Paste image link from Google Photos, WhatsApp..." value={photoUrl} onChange={function(e){setPhotoUrl(e.target.value);}} />
                <div style={{fontSize:11,color:"#9ca3af",marginTop:4}}>Share photo from Google Photos or WhatsApp, copy link, paste here</div>
                {photoUrl && <img src={photoUrl} alt="Apartment" style={{width:"100%",borderRadius:8,marginTop:8,maxHeight:200,objectFit:"cover"}} onError={function(e){e.target.style.display="none";}} />}
              </div>
              <div style={{display:"flex",gap:10}}>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Pros</label>
                  <input className="form-input" placeholder="Good location, modern..." value={pros} onChange={function(e){setPros(e.target.value);}} />
                </div>
                <div className="form-field" style={{flex:1}}>
                  <label className="form-label">Cons</label>
                  <input className="form-input" placeholder="Expensive, small..." value={cons} onChange={function(e){setCons(e.target.value);}} />
                </div>
              </div>
              <div className="form-field">
                <label className="form-label">Notes</label>
                <input className="form-input" placeholder="Any other details..." value={notes} onChange={function(e){setNotes(e.target.value);}} />
              </div>
              <button className="btn-primary" onClick={handleSave}>{isEdit ? "Save changes" : "Add apartment"}</button>
              {isEdit && !confirm && <button className="btn-danger" onClick={function(){setConfirm(true);}}>Remove apartment</button>}
              {isEdit && confirm && (
                <div style={{background:"#fef2f2",border:"1.5px solid #fecaca",borderRadius:12,padding:"14px 16px",marginTop:8}}>
                  <div style={{fontSize:13,fontWeight:600,color:"#dc2626",marginBottom:10}}>Remove this apartment?</div>
                  <div style={{display:"flex",gap:8}}>
                    <button onClick={function(){onDelete(apt.id);onClose();}} style={{flex:1,padding:"10px",background:"#dc2626",color:"#fff",border:"none",borderRadius:8,fontSize:13,fontWeight:600,cursor:"pointer"}}>Yes, remove</button>
                    <button onClick={function(){setConfirm(false);}} style={{flex:1,padding:"10px",background:"#fff",color:"#374151",border:"1.5px solid #e5e7eb",borderRadius:8,fontSize:13,cursor:"pointer"}}>Cancel</button>
                  </div>
                </div>
              )}
              <button className="btn-cancel" onClick={onClose}>Cancel</button>
            </div>
          </div>
        );
      }

      function ApartmentTracker() {
        var [apts, setApts] = useState([]);
        var [loading, setLoading] = useState(true);
        var [showModal, setShowModal] = useState(false);
        var [editing, setEditing] = useState(null);
        var [filterStatus, setFilterStatus] = useState("all");

        useEffect(function(){
          function load() {
            supabase.from("housing_listings").select("*").order("created_at").then(function(r){
              setApts(r.data || []);
              setLoading(false);
            });
          }
          load();
          var ch = supabase.channel("apartments-changes").on("postgres_changes",{event:"*",schema:"public",table:"housing_listings"},load).subscribe();
          return function(){ supabase.removeChannel(ch); };
        }, []);

        function saveApt(data) {
          if (data.id) {
            supabase.from("housing_listings").update(data).eq("id",data.id).then(function(){
              setApts(function(prev){return prev.map(function(a){return a.id===data.id?Object.assign({},a,data):a;});});
            });
          } else {
            supabase.from("housing_listings").insert([data]).select().then(function(r){
              if(r.data) setApts(function(prev){return prev.concat(r.data);});
            });
          }
        }

        function deleteApt(id) {
          supabase.from("housing_listings").delete().eq("id",id).then(function(){
            setApts(function(prev){return prev.filter(function(a){return a.id!==id;});});
          });
        }

        var filtered = filterStatus==="all" ? apts : apts.filter(function(a){return a.status===filterStatus;});

        return (
          <div>
            <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:16}}>
              <div>
                <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a"}}>Apartment Search</div>
                <div style={{fontSize:12,color:"#9ca3af",marginTop:2}}>{apts.length} tracked · tap card to edit</div>
              </div>
              <button onClick={function(){setEditing(null);setShowModal(true);}} style={{padding:"8px 16px",background:"#1e6eb5",color:"#fff",border:"none",borderRadius:10,fontSize:13,fontWeight:600,cursor:"pointer"}}>+ Add</button>
            </div>

            <div style={{display:"flex",gap:6,marginBottom:16,flexWrap:"wrap"}}>
              <button onClick={function(){setFilterStatus("all");}} style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:500,cursor:"pointer",background:filterStatus==="all"?"#1a1a1a":"#fff",color:filterStatus==="all"?"#fff":"#6b7280",border:"1.5px solid "+(filterStatus==="all"?"#1a1a1a":"#e5e7eb")}}>All ({apts.length})</button>
              {APPT_STATUSES.map(function(s){
                var count = apts.filter(function(a){return a.status===s.key;}).length;
                if (count === 0) return null;
                return (
                  <button key={s.key} onClick={function(){setFilterStatus(s.key);}} style={{padding:"4px 10px",borderRadius:20,fontSize:11,fontWeight:500,cursor:"pointer",background:filterStatus===s.key?s.color:s.bg,color:filterStatus===s.key?"#fff":s.color,border:"1.5px solid "+s.color}}>
                    {s.label} ({count})
                  </button>
                );
              })}
            </div>

            {loading && <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>Loading...</div>}

            {!loading && filtered.length === 0 && (
              <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>
                <div style={{fontSize:32,marginBottom:12}}>🏠</div>
                <div style={{fontSize:14,fontWeight:500,marginBottom:6}}>No apartments yet</div>
                <div style={{fontSize:13}}>Tap + Add to log the first one</div>
              </div>
            )}

            <div style={{display:"flex",flexDirection:"column",gap:10}}>
              {filtered.map(function(apt){
                var s = statusInfo(apt.status);
                return (
                  <div key={apt.id} onClick={function(){setEditing(apt);setShowModal(true);}} style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,padding:"14px 16px",cursor:"pointer",boxShadow:"0 1px 3px rgba(0,0,0,0.04)",borderLeft:"4px solid "+s.color}}>
                    <div style={{display:"flex",justifyContent:"space-between",alignItems:"flex-start",marginBottom:8}}>
                      <div style={{fontSize:15,fontWeight:600,color:"#1a1a1a",flex:1}}>{apt.name}</div>

                    </div>
                    <div style={{display:"flex",gap:16,flexWrap:"wrap",marginBottom:apt.pros||apt.cons||apt.notes?8:0}}>

                      {apt.address && <span style={{fontSize:12,color:"#6b7280"}}>{apt.address}</span>}
                      {apt.landlord && <span style={{fontSize:12,color:"#6b7280"}}>Landlord: {apt.landlord}</span>}
                      {apt.phone && <span style={{fontSize:12,color:"#6b7280"}}>{apt.phone}</span>}
                    </div>
                    {(apt.pros || apt.cons) && (
                      <div style={{display:"flex",gap:12,flexWrap:"wrap"}}>
                        {apt.pros && <span style={{fontSize:11,color:"#166534",background:"#f0fdf4",padding:"2px 8px",borderRadius:6}}>+ {apt.pros}</span>}
                        {apt.cons && <span style={{fontSize:11,color:"#dc2626",background:"#fef2f2",padding:"2px 8px",borderRadius:6}}>- {apt.cons}</span>}
                      </div>
                    )}
                    {apt.notes && <div style={{fontSize:11,color:"#6b7280",marginTop:6,fontStyle:"italic"}}>{apt.notes}</div>}
                    {apt.link && <div style={{fontSize:11,color:"#1e6eb5",marginTop:6}}>View listing →</div>}
                    {apt.photo_url && <img src={apt.photo_url} alt={apt.name} style={{width:"100%",borderRadius:8,marginTop:8,maxHeight:160,objectFit:"cover"}} onError={function(e){e.target.style.display="none";}} />}

            {showModal && (

      var ONEOFF_SEED = [
        {item:"Flight Sicily to Amsterdam",eur:"150-250",who:"Francesco"},
        {item:"VU tuition fee year 1",eur:"2,700",who:"Francesco"},
        {item:"Housing deposit",eur:"800-2,000",who:"Francesco"},
        {item:"First month rent",eur:"800-1,000",who:"Francesco"},
        {item:"VU housing application fee",eur:"500",who:"Done"},
        {item:"HousingAnywhere subscription",eur:"26-55",who:"Emanuel"},
        {item:"Bedding and essentials IKEA",eur:"200-300",who:"Francesco"},
        {item:"Books and study materials",eur:"200-400",who:"Emanuel"},
        {item:"OV-chipkaart + load",eur:"50",who:"Emanuel"},
        {item:"Dutch SIM card",eur:"20-30",who:"Emanuel"},
        {item:"Health insurance first month",eur:"130-150",who:"Francesco"},
        {item:"Apostille documents",eur:"100-200",who:"Francesco"},
        {item:"Misc buffer",eur:"300",who:"-"},
      ];
      var MONTHLY_SEED = [
        {item:"Rent",eur:"800-1,000"},{item:"Food and groceries",eur:"200-250"},
        {item:"Public transport",eur:"80-100"},{item:"Phone",eur:"15-20"},
        {item:"Health insurance",eur:"130-150"},{item:"Social / going out",eur:"150-200"},
        {item:"Books and misc",eur:"50-100"},
      ];

      function BudgetTab() {
        var [oneoff, setOneoff] = useState([]);
        var [monthly, setMonthly] = useState([]);
        var [loading, setLoading] = useState(true);

        useEffect(function(){
          loadBudget();
        }, []);

        useEffect(function(){
          var ch1 = supabase.channel("budget-oneoff-changes").on("postgres_changes",{event:"*",schema:"public",table:"budget_oneoff"},loadBudget).subscribe();
          var ch2 = supabase.channel("budget-monthly-changes").on("postgres_changes",{event:"*",schema:"public",table:"budget_monthly"},loadBudget).subscribe();
          return function(){ supabase.removeChannel(ch1); supabase.removeChannel(ch2); };
        }, []);

        function loadBudget() {
          supabase.from("budget_oneoff").select("*").order("created_at").then(function(r1){
            supabase.from("budget_monthly").select("*").order("created_at").then(function(r2){
              var oo = r1.data || [];
              var mo = r2.data || [];
              if (oo.length === 0) {
                supabase.from("budget_oneoff").insert(ONEOFF_SEED).then(function(){
                  supabase.from("budget_oneoff").select("*").order("created_at").then(function(r){setOneoff(r.data||[]);});
                });
              } else { setOneoff(oo); }
              if (mo.length === 0) {
                supabase.from("budget_monthly").insert(MONTHLY_SEED).then(function(){
                  supabase.from("budget_monthly").select("*").order("created_at").then(function(r){setMonthly(r.data||[]);});
                });
              } else { setMonthly(mo); }
              setLoading(false);
            });
          });
        }

        function saveOneoff(id, data) {
          supabase.from("budget_oneoff").update(data).eq("id",id).then(function(){
            setOneoff(function(prev){return prev.map(function(r){return r.id===id?Object.assign({},r,data):r;});});
          });
        }
        function deleteOneoff(id) {
          supabase.from("budget_oneoff").delete().eq("id",id).then(function(){
            setOneoff(function(prev){return prev.filter(function(r){return r.id!==id;});});
          });
        }
        function addOneoff(data) {
          supabase.from("budget_oneoff").insert([data]).select().then(function(r){
            if(r.data) setOneoff(function(prev){return prev.concat(r.data);});
          });
        }
        function saveMonthly(id, data) {
          supabase.from("budget_monthly").update(data).eq("id",id).then(function(){
            setMonthly(function(prev){return prev.map(function(r){return r.id===id?Object.assign({},r,data):r;});});
          });
        }
        function deleteMonthly(id) {
          supabase.from("budget_monthly").delete().eq("id",id).then(function(){
            setMonthly(function(prev){return prev.filter(function(r){return r.id!==id;});});
          });
        }
        function addMonthly(data) {
          supabase.from("budget_monthly").insert([data]).select().then(function(r){
            if(r.data) setMonthly(function(prev){return prev.concat(r.data);});
          });
        }

        if (loading) return <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>Loading budget...</div>;

        // Parse EUR string to get min/max numbers
        function parseEur(s) {
          if (!s) return [0,0];
          var clean = s.replace(/[^0-9.,\-]/g,"");
          var parts = clean.split("-");
          if (parts.length === 2) {
            return [parseFloat(parts[0].replace(",",""))||0, parseFloat(parts[1].replace(",",""))||0];
          }
          var n = parseFloat(clean.replace(",",""))||0;
          return [n,n];
        }

        var oneoffMin = oneoff.reduce(function(acc,r){ return acc + parseEur(r.eur)[0]; }, 0);
        var oneoffMax = oneoff.reduce(function(acc,r){ return acc + parseEur(r.eur)[1]; }, 0);
        var monthlyMin = monthly.reduce(function(acc,r){ return acc + parseEur(r.eur)[0]; }, 0);
        var monthlyMax = monthly.reduce(function(acc,r){ return acc + parseEur(r.eur)[1]; }, 0);

        function fmtRange(min, max) {
          if (min === max) return min.toLocaleString() + " EUR";
          return min.toLocaleString() + " - " + max.toLocaleString() + " EUR";
        }

        return (
          <div>
            <div style={{marginBottom:24}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a"}}>One-Off Setup Costs</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>tap any row to edit</div>
              </div>
              <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,overflow:"hidden"}}>
                {oneoff.map(function(row){
                  return <BudgetRow key={row.id} row={row} onSave={saveOneoff} onDelete={deleteOneoff} showWho={true} />;
                })}
                <AddBudgetRow onAdd={addOneoff} showWho={true} />
                <div style={{display:"flex",justifyContent:"space-between",padding:"12px 16px",background:"#eff6ff",borderTop:"2px solid #bfdbfe"}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#1e40af"}}>Total estimate</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#1e40af"}}>{fmtRange(oneoffMin, oneoffMax)}</span>
                </div>
              </div>
            </div>
            <div style={{marginBottom:24}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"baseline",marginBottom:4}}>
                <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a"}}>Monthly Running Costs</div>
                <div style={{fontSize:11,color:"#9ca3af"}}>tap any row to edit</div>
              </div>
              <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,overflow:"hidden"}}>
                {monthly.map(function(row){
                  return <BudgetRow key={row.id} row={row} onSave={saveMonthly} onDelete={deleteMonthly} showWho={false} />;
                })}
                <AddBudgetRow onAdd={addMonthly} showWho={false} />
                <div style={{display:"flex",justifyContent:"space-between",padding:"12px 16px",background:"#eff6ff",borderTop:"2px solid #bfdbfe"}}>
                  <span style={{fontSize:13,fontWeight:700,color:"#1e40af"}}>Monthly Total</span>
                  <span style={{fontSize:13,fontWeight:700,color:"#1e40af"}}>{fmtRange(monthlyMin, monthlyMax)}</span>
                </div>
              </div>
            </div>
            <div style={{background:"#1e6eb5",borderRadius:12,padding:"16px 20px"}}>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",marginBottom:6,textTransform:"uppercase",letterSpacing:"1px",fontWeight:600}}>Annual cost estimate</div>
              <div style={{fontSize:22,fontWeight:700,color:"#fff"}}>{(oneoffMin + monthlyMin*12).toLocaleString()} - {(oneoffMax + monthlyMax*12).toLocaleString()} EUR</div>
              <div style={{fontSize:12,color:"rgba(255,255,255,0.7)",marginTop:4}}>One-off + 12 months running costs</div>
            </div>
          </div>
        );
      }

      function App() {
        var [tasks, setTasks] = useState([]);
        var [loading, setLoading] = useState(true);
        var [activeTab, setActiveTab] = useState("today");
        var [activeCategory, setActiveCategory] = useState("All Tasks");
        var [activeOwner, setActiveOwner] = useState("All");
        var [editingTask, setEditingTask] = useState(null);
        var [showAdd, setShowAdd] = useState(false);
        var [seeded, setSeeded] = useState(false);
        var [showInstall, setShowInstall] = useState(true);
        var [showDone, setShowDone] = useState(false);
        var [quickFilter, setQuickFilter] = useState(null);
        var [sortBy, setSortBy] = useState("default");

        useEffect(function(){
          loadTasks();
          var ch = supabase.channel("tasks-stable")
            .on("postgres_changes",{event:"*",schema:"public",table:"tasks"},function(){loadTasks();})
            .subscribe();
          return function(){ supabase.removeChannel(ch); };
        }, []);

        function loadTasks() {
          supabase.from("tasks").select("*").order("created_at").then(function(result){
            var data = result.data;
            var error = result.error;
            if (error) { setLoading(false); console.error("Tasks load error:", error); return; }
            if (data.length === 0 && !seeded) {
              setSeeded(true);
              supabase.from("tasks").insert(INITIAL_TASKS).then(function(){
                supabase.from("tasks").select("*").order("created_at").then(function(r2){
                  setTasks(r2.data || []);
                  setLoading(false);
                });
              });
            } else {
              setTasks(data);
              setLoading(false);
            }
          });
        }

        function toggleTask(id, completed) {
          supabase.from("tasks").update({completed:!completed}).eq("id",id).then(function(){
            setTasks(function(prev){ return prev.map(function(t){ return t.id===id ? Object.assign({},t,{completed:!completed}) : t; }); });
          });
        }

        function saveTask(taskData) {
          if (taskData.id) {
            supabase.from("tasks").update(taskData).eq("id",taskData.id).then(function(){
              setTasks(function(prev){ return prev.map(function(t){ return t.id===taskData.id ? Object.assign({},t,taskData) : t; }); });
            });
          } else {
            supabase.from("tasks").insert([taskData]).select().then(function(r){
              if (r.data) setTasks(function(prev){ return prev.concat(r.data); });
            });
          }
        }

        function deleteTask(id) {
          supabase.from("tasks").delete().eq("id",id).then(function(){
            setTasks(function(prev){ return prev.filter(function(t){ return t.id!==id; }); });
          });
        }

        function addNote(id, notesThread) {
          supabase.from("tasks").update({notes_thread:notesThread}).eq("id",id).then(function(){
            setTasks(function(prev){ return prev.map(function(t){ return t.id===id ? Object.assign({},t,{notes_thread:notesThread}) : t; }); });
          });
        }

        var allFiltered = tasks.filter(function(t){
          return (activeCategory==="All Tasks" || t.category===activeCategory) && (activeOwner==="All" || t.owner===activeOwner);
        });

        var activeTasks = allFiltered.filter(function(t){
          if (quickFilter==="urgent") return t.urgent && !t.completed;
          if (quickFilter==="remaining") return !t.completed;
          return !t.completed;
        });

        if (sortBy==="deadline") {
          var ORDER = {"Immediately":0,"This week":1,"Book by end Jun 2026":2,"2 Jul 2026":3,"5 Jul 2026":4,"Week of 7 Jul 2026":5,"Before Jul 2026":6,"July 2026":7,"Before 1 Aug 2026":8,"August 2026":9,"Before 31 Aug 2026":10,"Late Aug 2026":11,"As soon as found":12,"On contract signing":13,"Weekly check":14,"First week Amsterdam":15,"Day of arrival":16,"Within 5 days of arrival":17,"Before Emanuel arrives":18};
          activeTasks = activeTasks.slice().sort(function(a,b){
            var ap = a.urgent ? -1 : (ORDER[a.due_date] !== undefined ? ORDER[a.due_date] : 99);
            var bp = b.urgent ? -1 : (ORDER[b.due_date] !== undefined ? ORDER[b.due_date] : 99);
            return ap - bp;
          });
        }

        var doneTasks = quickFilter==="urgent" ? [] : allFiltered.filter(function(t){ return t.completed; });
        var completedCount = tasks.filter(function(t){ return t.completed; }).length;
        var totalCount = tasks.length;
        var urgentCount = tasks.filter(function(t){ return t.urgent && !t.completed; }).length;
        var progress = totalCount > 0 ? Math.round((completedCount/totalCount)*100) : 0;

        return (
          <div style={{minHeight:"100vh",background:"#f4f6f8",paddingBottom:80,paddingTop:showInstall?46:0}}>

            {showInstall && (
              <div className="install-banner">
                <span style={{fontSize:13,fontWeight:500}}>Install on iPhone: tap Share then "Add to Home Screen"</span>
                <button onClick={function(){setShowInstall(false);}} style={{background:"none",border:"none",color:"#fff",fontSize:20,cursor:"pointer",lineHeight:1}}>x</button>
              </div>
            )}

            <div style={{background:"#fff",borderBottom:"1px solid #e5e3df",padding:"0 20px",position:"sticky",top:showInstall?46:0,zIndex:10,overflow:"hidden"}}>
              <div style={{maxWidth:"100%",margin:"0 auto"}}>
                <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"14px 0 10px"}}>
                  <div style={{display:"flex",alignItems:"center",gap:12}}>
                    <GIcon size={44} />
                    <div>
                      <div style={{fontSize:18,fontWeight:700,color:"#1a1a1a",fontFamily:"Futura,Century Gothic,sans-serif"}}>Guarracino</div>
                      <div style={{fontSize:10,color:"#9ca3af",letterSpacing:"2px",fontFamily:"Futura,Century Gothic,sans-serif"}}>FAMILY</div>
                    </div>
                  </div>
                  <div style={{textAlign:"right"}}>
                    <div style={{fontSize:22,fontWeight:700,color:"#1e6eb5"}}>{progress}%</div>
                    <div style={{fontSize:11,color:"#9ca3af"}}>{completedCount}/{totalCount} done</div>
                  </div>
                </div>

                <div style={{marginBottom:10}}>
                  <div style={{height:10,background:"#e5e7eb",borderRadius:5,overflow:"hidden"}}>
                    <div style={{height:"100%",width:progress+"%",background:"linear-gradient(90deg,#60a5fa,#1e6eb5)",borderRadius:5,transition:"width 0.6s ease",minWidth:progress>0?"10px":"0"}} />
                  </div>
                  {progress > 0 && <div style={{fontSize:10,color:"#1e6eb5",fontWeight:600,textAlign:"right",marginTop:2}}>{progress}% complete</div>}
                </div>

                <div style={{display:"flex",gap:8,marginBottom:10,flexWrap:"wrap"}}>
                  {urgentCount > 0 && (
                    <button onClick={function(){setQuickFilter(quickFilter==="urgent"?null:"urgent");setActiveTab("tasks");}} style={{background:quickFilter==="urgent"?"#f59e0b":"#fef3c7",border:"1px solid #fcd34d",borderRadius:20,padding:"3px 10px",fontSize:11,color:quickFilter==="urgent"?"#fff":"#92400e",fontWeight:500,cursor:"pointer"}}>
                      {urgentCount} urgent
                    </button>
                  )}
                  <button onClick={function(){setQuickFilter(quickFilter==="done"?null:"done");setShowDone(true);setActiveTab("tasks");}} style={{background:quickFilter==="done"?"#166534":"#f0fdf4",border:"1px solid #bbf7d0",borderRadius:20,padding:"3px 10px",fontSize:11,color:quickFilter==="done"?"#fff":"#166534",fontWeight:500,cursor:"pointer"}}>
                    {completedCount} done
                  </button>
                  <button onClick={function(){setQuickFilter(quickFilter==="remaining"?null:"remaining");setActiveTab("tasks");}} style={{background:quickFilter==="remaining"?"#374151":"#f8f9fa",border:"1px solid #e5e7eb",borderRadius:20,padding:"3px 10px",fontSize:11,color:quickFilter==="remaining"?"#fff":"#6b7280",fontWeight:500,cursor:"pointer"}}>
                    {totalCount-completedCount} remaining
                  </button>
                </div>

                <div className="tab-scroll" style={{display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch",scrollbarWidth:"none",msOverflowStyle:"none",width:"100%"}}>
                  {[["today","Overview"],["tasks","Tasks"],["timeline","Timeline"],["housing","Housing"],["apartments","Apartments"],["spending","Spending"],["budget","Budget"]].map(function(item){
                    return <button key={item[0]} onClick={function(){setActiveTab(item[0]);}} style={{padding:"9px 14px",fontSize:13,fontWeight:500,background:"none",border:"none",cursor:"pointer",borderBottom:activeTab===item[0]?"2px solid #1e6eb5":"2px solid transparent",color:activeTab===item[0]?"#1e6eb5":"#6b7280",flexShrink:0,whiteSpace:"nowrap"}}>{item[1]}</button>;
                  })}
                </div>
              </div>
            </div>

            <div style={{maxWidth:"100%",margin:"0 auto",padding:"20px",minHeight:"calc(100vh - 200px)",overflow:"hidden"}}>

              {activeTab==="tasks" && (
                <div>
                  <div style={{display:"flex",gap:8,marginBottom:12,flexWrap:"wrap"}}>
                    {OWNERS.map(function(owner){
                      var c = OWNER_COLORS[owner] || OWNER_COLORS.All;
                      return <button key={owner} onClick={function(){setActiveOwner(owner);}} style={{padding:"5px 14px",borderRadius:20,fontSize:12,fontWeight:500,cursor:"pointer",background:activeOwner===owner?(owner==="All"?"#1a1a1a":c.bg):"#fff",color:activeOwner===owner?(owner==="All"?"#fff":c.text):"#6b7280",border:"1.5px solid "+(activeOwner===owner?(owner==="All"?"#1a1a1a":c.border):"#e5e7eb")}}>{owner}</button>;
                    })}
                  </div>

                  <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                    <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                      {ALL_CATEGORIES.map(function(cat){
                        return <button key={cat} onClick={function(){setActiveCategory(cat);}} style={{padding:"4px 10px",borderRadius:6,fontSize:11,fontWeight:500,cursor:"pointer",background:activeCategory===cat?"#1e6eb5":"#fff",color:activeCategory===cat?"#fff":"#6b7280",border:"1.5px solid "+(activeCategory===cat?"#1e6eb5":"#e5e7eb")}}>{cat}</button>;
                      })}
                    </div>
                    <div style={{display:"flex",gap:4,flexShrink:0,marginLeft:8}}>
                      <button onClick={function(){setSortBy("default");}} style={{padding:"4px 8px",borderRadius:6,fontSize:11,cursor:"pointer",background:sortBy==="default"?"#1e6eb5":"#fff",color:sortBy==="default"?"#fff":"#6b7280",border:"1.5px solid "+(sortBy==="default"?"#1e6eb5":"#e5e7eb")}}>Default</button>
                      <button onClick={function(){setSortBy("deadline");}} style={{padding:"4px 8px",borderRadius:6,fontSize:11,cursor:"pointer",background:sortBy==="deadline"?"#1e6eb5":"#fff",color:sortBy==="deadline"?"#fff":"#6b7280",border:"1.5px solid "+(sortBy==="deadline"?"#1e6eb5":"#e5e7eb")}}>Deadline</button>
                    </div>
                  </div>

                  {loading ? <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>Loading...</div> : (
                    <div>
                      {quickFilter==="done" ? (
                        <div style={{display:"flex",flexDirection:"column",gap:8}}>
                          {doneTasks.length===0
                            ? <div style={{textAlign:"center",padding:60,color:"#9ca3af"}}>No completed tasks yet.</div>
                            : doneTasks.map(function(task){ return <TaskCard key={task.id} task={task} onToggle={toggleTask} onEdit={setEditingTask} onAddNote={addNote} />; })
                          }
                        </div>
                      ) : (
                        <div>
                          {activeTasks.length===0 && <div style={{textAlign:"center",padding:40,color:"#9ca3af"}}>No tasks here.</div>}
                          <div style={{display:"flex",flexDirection:"column",gap:8}}>
                            {activeTasks.map(function(task){ return <TaskCard key={task.id} task={task} onToggle={toggleTask} onEdit={setEditingTask} onAddNote={addNote} />; })}
                          </div>
                          {doneTasks.length > 0 && (
                            <div style={{marginTop:20}}>
                              <button onClick={function(){setShowDone(!showDone);}} style={{background:"none",border:"none",cursor:"pointer",fontSize:12,fontWeight:600,color:"#9ca3af",textTransform:"uppercase",letterSpacing:"1px",marginBottom:8}}>
                                {showDone?"▼":"▶"} Completed ({doneTasks.length})
                              </button>
                              {showDone && (
                                <div style={{display:"flex",flexDirection:"column",gap:8}}>
                                  {doneTasks.map(function(task){ return <TaskCard key={task.id} task={task} onToggle={toggleTask} onEdit={setEditingTask} onAddNote={addNote} />; })}
                                </div>
                              )}
                            </div>
                          )}
                        </div>
                      )}
                    </div>
                  )}
                </div>
              )}

              {activeTab==="today" && <TodayDashboard tasks={tasks} setActiveTab={setActiveTab} setActiveCategory={setActiveCategory} setQuickFilter={setQuickFilter} />}
              {activeTab==="timeline" && <Timeline />}
              {activeTab==="apartments" && <ApartmentTracker />}
              {activeTab==="spending" && <SpendingTracker />}

              {activeTab==="housing" && (
                <div>
                  <div style={{marginBottom:20}}>
                    <div style={{fontSize:16,fontWeight:600,color:"#1a1a1a",marginBottom:4}}>Housing Platforms</div>
                    <div style={{fontSize:13,color:"#6b7280"}}>Register on all 5. More registrations = better chances.</div>
                  </div>
                  <div style={{display:"flex",flexDirection:"column",gap:10}}>
                    {HOUSING_AGENCIES.map(function(agency){
                      return (
                        <a key={agency.name} href={agency.url} target="_blank" rel="noopener noreferrer">
                          <div style={{background:"#fff",border:"1px solid #e5e3df",borderRadius:12,padding:"15px 18px",display:"flex",alignItems:"center",gap:14,boxShadow:"0 1px 3px rgba(0,0,0,0.04)",borderLeft:"4px solid "+agency.color}}>
                            <div style={{flex:1}}>
                              <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:3}}>
                                <span style={{fontSize:14,fontWeight:600,color:"#1a1a1a"}}>{agency.name}</span>
                                <span style={{fontSize:10,fontWeight:600,color:agency.color,padding:"2px 7px",borderRadius:10,border:"1px solid "+agency.color}}>{agency.badge}</span>
                              </div>
                              <div style={{fontSize:12,color:"#6b7280"}}>{agency.desc}</div>
                            </div>
                            <div style={{color:"#9ca3af",fontSize:16}}>-&gt;</div>
                          </div>
                        </a>
                      );
                    })}
                  </div>
                </div>
              )}

              {activeTab==="budget" && (
                <BudgetTab />
              )}
            </div>

            {activeTab==="tasks" && (
              <button className="add-fab" onClick={function(){setShowAdd(true);}}>
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none">
                  <path d="M12 5v14M5 12h14" stroke="#fff" strokeWidth="2.5" strokeLinecap="round"/>
                </svg>
              </button>
            )}

            {showAdd && <TaskModal onClose={function(){setShowAdd(false);}} onSave={saveTask} onDelete={deleteTask} />}
            {editingTask && <TaskModal task={editingTask} onClose={function(){setEditingTask(null);}} onSave={saveTask} onDelete={deleteTask} />}
          </div>
        );
      }

      ReactDOM.createRoot(document.getElementById("root")).render(React.createElement(App));
    </script>
  </body>
</html>
